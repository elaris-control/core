<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<script>try{document.documentElement.dataset.theme=localStorage.getItem("elaris_theme")||"dark";}catch(e){document.documentElement.dataset.theme="dark";}</script>
  <script src="/csrf.js?v=1"></script>
<title>ELARIS — Login</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;700&family=Outfit:wght@400;600;700;800;900&display=swap');

:root {
  --bg:#080c14; --surface:#0d1221; --card:#111828;
  --line:rgba(255,255,255,.07); --line2:rgba(255,255,255,.13);
  --text:#e8edf5; --muted:#5a6a85; --muted2:#8494ad;
  --blue:#1d8cff; --blue2:#0a5fd4;
  --orange:#ff6820; --orange2:#ff9a3a;
  --good:#22d97a; --bad:#ff4545;
  --radius:14px; --radius-sm:9px;
  --shadow:0 24px 60px rgba(0,0,0,.6);
}
*, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }

body {
  font-family:'Outfit',sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
  background-image:
    radial-gradient(ellipse 800px 500px at 15% 10%,  rgba(29,140,255,.12) 0%,transparent 65%),
    radial-gradient(ellipse 600px 400px at 85% 80%,  rgba(255,104,32,.10) 0%,transparent 65%),
    linear-gradient(var(--bg),var(--bg));
}

.wrap {
  width: 100%;
  max-width: 400px;
  display: flex;
  flex-direction: column;
  gap: 24px;
}

/* Brand */
.brand {
  display: flex;
  align-items: center;
  gap: 14px;
  justify-content: center;
}
.brand-logo {
  width: 56px; height: 56px;
  filter: drop-shadow(0 0 16px rgba(255,104,32,.4));
}
.brand-text .name {
  font-weight: 900; font-size: 28px; letter-spacing: 3px;
  background: linear-gradient(90deg,var(--blue) 0%,var(--orange) 100%);
  -webkit-background-clip:text; background-clip:text; color:transparent;
  line-height:1;
}
.brand-text .sub {
  font-size: 11px; font-weight:700; color:var(--muted);
  letter-spacing:2px; text-transform:uppercase; margin-top:3px;
}

/* Card */
.card {
  background: var(--card);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  padding: 28px;
  position: relative;
  overflow: hidden;
}
.card::before {
  content:""; position:absolute; top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,var(--blue) 0%,var(--orange) 100%);
}

/* Tabs */
.tabs { display:flex; gap:4px; margin-bottom:24px; background:rgba(255,255,255,.04); border-radius:var(--radius-sm); padding:4px; }
.tab { flex:1; padding:9px; text-align:center; border-radius:7px; font-weight:700; font-size:13px; cursor:pointer; color:var(--muted2); border:none; background:none; transition:all .15s; font-family:'Outfit',sans-serif; }
.tab.active { background:var(--card); color:var(--text); box-shadow:0 2px 8px rgba(0,0,0,.3); }

/* Form */
.form { display:flex; flex-direction:column; gap:14px; }
.field { display:flex; flex-direction:column; gap:6px; }
.label { font-size:11px; font-weight:700; color:var(--muted2); text-transform:uppercase; letter-spacing:.08em; }
.input {
  padding:11px 14px; border-radius:var(--radius-sm);
  border:1px solid var(--line2); background:rgba(255,255,255,.04);
  color:var(--text); font-family:'Outfit',sans-serif; font-size:14px; font-weight:600;
  outline:none; transition:border-color .15s;
}
.input:focus { border-color:var(--blue); }
.input::placeholder { color:var(--muted); }

/* Buttons */
.btn-primary {
  padding:13px; border-radius:var(--radius-sm); border:none;
  background:linear-gradient(135deg,var(--blue2) 0%,var(--blue) 55%,var(--orange) 100%);
  color:#fff; font-family:'Outfit',sans-serif; font-weight:800; font-size:14px;
  cursor:pointer; transition:filter .15s,transform .1s; letter-spacing:.3px;
  box-shadow:0 4px 20px rgba(29,140,255,.25);
}
.btn-primary:hover { filter:brightness(1.1); }
.btn-primary:active { transform:scale(.98); }

.divider { display:flex; align-items:center; gap:12px; color:var(--muted); font-size:12px; font-weight:600; }
.divider::before, .divider::after { content:""; flex:1; height:1px; background:var(--line); }

.btn-oauth {
  display:flex; align-items:center; justify-content:center; gap:10px;
  padding:12px; border-radius:var(--radius-sm);
  border:1px solid var(--line2); background:rgba(255,255,255,.04);
  color:var(--text); font-family:'Outfit',sans-serif; font-weight:700; font-size:13px;
  cursor:pointer; transition:background .15s,border-color .15s; text-decoration:none;
}
.btn-oauth:hover { background:rgba(255,255,255,.09); border-color:var(--line2); }
.btn-oauth svg { width:18px; height:18px; flex-shrink:0; }

.oauth-row { display:flex; gap:10px; }
.oauth-row .btn-oauth { flex:1; }

/* Error / info */
.msg { padding:10px 14px; border-radius:var(--radius-sm); font-size:13px; font-weight:700; display:none; }
.msg.error { background:rgba(255,69,69,.12); border:1px solid rgba(255,69,69,.3); color:var(--bad); display:block; }
.msg.success { background:rgba(34,217,122,.10); border:1px solid rgba(34,217,122,.25); color:var(--good); display:block; }

/* Footer note */
.footer-note { text-align:center; font-size:12px; color:var(--muted); }
.footer-note a { color:var(--blue); text-decoration:none; }

/* OAuth disabled notice */
.oauth-disabled { display:none; }

:root[data-theme="light"]{
  --bg:#f5f7fb; --surface:#ffffff; --card:#ffffff;
  --line:rgba(15,23,42,.08); --line2:rgba(15,23,42,.14);
  --text:#0f172a; --muted:#64748b; --muted2:#475569;
  --blue:#1d8cff; --blue2:#0a5fd4; --orange:#ff6820;
  --good:#16a34a; --bad:#dc2626; --warn:#ca8a04;
  --shadow:0 18px 55px rgba(2,6,23,.10); --shadow-sm:0 4px 16px rgba(2,6,23,.08);
}
:root[data-theme="light"] body{
  background-image:
    radial-gradient(ellipse 800px 400px at 10% 0%, rgba(29,140,255,.06) 0%,transparent 60%),
    radial-gradient(ellipse 600px 300px at 90% 80%, rgba(255,104,32,.05) 0%,transparent 60%),
    linear-gradient(var(--bg),var(--bg));
}
:root[data-theme="light"] .card,
:root[data-theme="light"] .stat-card,
:root[data-theme="light"] .tbl-wrap,
:root[data-theme="light"] .page,
:root[data-theme="light"] .wrap{ color:var(--text); }
:root[data-theme="light"] .input,
:root[data-theme="light"] input,
:root[data-theme="light"] select,
:root[data-theme="light"] textarea{ background:#fff; color:#0f172a; }

</style>
<script src="/i18n.js"></script>
</head>
<body>

<div class="wrap">

  <div class="brand">
    <svg class="brand-logo" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%"   stop-color="#1a5fcc"/>
          <stop offset="60%"  stop-color="#0a3fa0"/>
          <stop offset="100%" stop-color="#ff6820"/>
        </linearGradient>
        <linearGradient id="g2" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%"   stop-color="#ff6820"/>
          <stop offset="100%" stop-color="#ffaa40"/>
        </linearGradient>
      </defs>
      <circle cx="50" cy="50" r="48" fill="url(#g1)" opacity=".95"/>
      <path d="M50 18 L50 50" stroke="url(#g2)" stroke-width="8" stroke-linecap="round"/>
      <path d="M31 29 A26 26 0 1 0 69 29" stroke="url(#g2)" stroke-width="8" stroke-linecap="round" fill="none"/>
    </svg>
    <div class="brand-text">
      <div class="name">ELARIS</div>
      <div class="sub">Smart Control</div>
    </div>
  </div>

  <div class="card">

    <div class="tabs">
      <button class="tab active" id="tabLogin"    onclick="showTab('login')">Login</button>
      <button class="tab"        id="tabRegister" onclick="showTab('register')">Register</button>
    </div>

    <div id="msgBox" class="msg"></div>

    <!-- LOGIN FORM -->
    <div id="loginForm" class="form">
      <div class="field">
        <label class="label">Email</label>
        <input class="input" id="loginEmail" type="email" placeholder="you@example.com" autocomplete="email">
      </div>
      <div class="field">
        <label class="label">Password</label>
        <input class="input" id="loginPass" type="password" placeholder="••••••••" autocomplete="current-password">
      </div>
      <button class="btn-primary" onclick="doLogin()">Login</button>

      <div class="divider" id="oauthDivider">or continue with</div>

      <div class="oauth-row" id="oauthBtns">
        <a class="btn-oauth" href="/auth/google" id="btnGoogle">
          <svg viewBox="0 0 24 24" fill="none"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
          Google
        </a>
        <a class="btn-oauth" href="/auth/github" id="btnGithub">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0112 6.844c.85.004 1.705.115 2.504.337 1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.019 10.019 0 0022 12.017C22 6.484 17.522 2 12 2z"/></svg>
          GitHub
        </a>
      </div>
    </div>

    <!-- REGISTER FORM -->
    <div id="registerForm" class="form" style="display:none">
      <div class="field">
        <label class="label">Name</label>
        <input class="input" id="regName" type="text" placeholder="Your name" autocomplete="name">
      </div>
      <div class="field">
        <label class="label">Email</label>
        <input class="input" id="regEmail" type="email" placeholder="you@example.com" autocomplete="email">
      </div>
      <div class="field">
        <label class="label">Password <span style="color:var(--muted);font-weight:600">(min 8 characters)</span></label>
        <input class="input" id="regPass" type="password" placeholder="••••••••" autocomplete="new-password">
      </div>
      <div class="field">
        <label class="label">Confirm Password</label>
        <input class="input" id="regPassConfirm" type="password" placeholder="••••••••" autocomplete="new-password">
      </div>
      <button class="btn-primary" onclick="doRegister()">Create account</button>
    </div>

  </div>

  <div class="footer-note">
    ELARIS v0.2 · <a href="#">Βοήθεια</a>
  </div>

</div>

<script>
const params = new URLSearchParams(location.search);
if (params.get("error")) {
  showMsg("Σφάλμα σύνδεσης: " + params.get("error"), "error");
}

// Check if OAuth is enabled
// OAuth availability check removed (not needed)

function showTab(tab) {
  document.getElementById("loginForm").style.display    = tab==="login"    ? "flex" : "none";
  document.getElementById("registerForm").style.display = tab==="register" ? "flex" : "none";
  document.getElementById("tabLogin").classList.toggle("active",    tab==="login");
  document.getElementById("tabRegister").classList.toggle("active", tab==="register");
  clearMsg();
}

function showMsg(msg, type="error") {
  const el = document.getElementById("msgBox");
  el.textContent = msg;
  el.className = "msg " + type;
}
function clearMsg() {
  const el = document.getElementById("msgBox");
  el.className = "msg";
  el.textContent = "";
}

async function doLogin() {
  clearMsg();
  const email    = document.getElementById("loginEmail").value.trim();
  const password = document.getElementById("loginPass").value;
  if (!email || !password) return showMsg("Enter email and password.");
  try {
    const r = await fetch("/auth/login", {
      method:"POST", credentials:"include",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify({ email, password })
    });
    const d = await r.json();
    if (d.ok) { window.location.href = "/"; }
    else showMsg(d.error === "invalid_credentials" ? "Wrong email or password." : d.error);
  } catch { showMsg("Connection error. Try again."); }
}

async function doRegister() {
  clearMsg();
  const name     = document.getElementById("regName").value.trim();
  const email    = document.getElementById("regEmail").value.trim();
  const password = document.getElementById("regPass").value;
  const confirm  = document.getElementById("regPassConfirm").value;
  if (!email || !password) return showMsg("Enter email and password.");
  if (password.length < 8) return showMsg("Password must be at least 8 characters.");
  if (password !== confirm) return showMsg("Passwords do not match.");
  try {
    const r = await fetch("/auth/register", {
      method:"POST", credentials:"include",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify({ email, name, password })
    });
    const d = await r.json();
    if (d.ok) { window.location.href = "/"; }
    else if (d.error === "email_taken") showMsg("This email is already in use.");
    else showMsg(d.error || "Registration error.");
  } catch { showMsg("Connection error. Try again."); }
}

// Enter key support
document.addEventListener("keydown", e => {
  if (e.key !== "Enter") return;
  if (document.getElementById("loginForm").style.display !== "none") doLogin();
  else doRegister();
});

// Auto-redirect if already logged in
fetch("/api/me", {credentials:"include"}).then(r=>r.json()).then(d=>{
  if (d.ok && d.user) window.location.href = "/";
}).catch(()=>{});
</script>
<script src="/theme.js?v=1"></script>
</body>
</html>
