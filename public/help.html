<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>ELARIS — Module Help</title>
  <script>try{document.documentElement.dataset.theme=localStorage.getItem('elaris_theme')||'dark';}catch(e){document.documentElement.dataset.theme='dark';}</script>
  <script src="/csrf.js?v=1"></script>
  <link rel="icon" href="/favicon.ico">
  <link rel="manifest" href="/manifest.json">
  <link rel="stylesheet" href="/styles.css?v=22">
  <style>
    /* ── Layout ─────────────────────────────────────────────────────────── */
    .help-grid{display:grid;grid-template-columns:300px 1fr;gap:16px;padding:16px;align-items:start;flex:1;overflow:hidden;min-height:0}
    .help-list{display:flex;flex-direction:column;gap:10px;height:calc(100vh - 160px);overflow-y:auto;padding-right:4px}
    .help-detail-wrap{height:calc(100vh - 160px);overflow-y:auto;padding:20px}

    /* ── Left panel items ───────────────────────────────────────────────── */
    .help-item{padding:14px 16px;border:1px solid var(--line);border-radius:var(--radius);background:var(--card);cursor:pointer;transition:.15s;position:relative;overflow:hidden}
    .help-item::before{content:"";position:absolute;inset:0 auto auto 0;height:2px;width:100%;background:linear-gradient(90deg,var(--blue),var(--orange))}
    .help-item:hover{transform:translateY(-1px);border-color:var(--line2)}
    .help-item.active{box-shadow:0 0 0 2px rgba(29,140,255,.18);border-color:rgba(29,140,255,.35)}
    .hiName{font-size:13px;font-weight:800;margin-bottom:3px}
    .hiMeta{font-size:10px;color:var(--muted);font-family:'Geist Mono',monospace;margin-bottom:5px;text-transform:uppercase;letter-spacing:.04em}
    .hiDesc{font-size:11px;color:var(--muted2);line-height:1.45}

    /* ── Module header ──────────────────────────────────────────────────── */
    .module-header{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;margin-bottom:20px;padding-bottom:16px;border-bottom:1px solid var(--line)}
    .module-header-left{flex:1;min-width:0}
    .module-title{font-size:22px;font-weight:900;line-height:1.2;margin-bottom:6px}
    .module-desc{font-size:13px;color:var(--muted2);line-height:1.6}
    .module-badges{display:flex;gap:6px;flex-wrap:wrap;flex-shrink:0}
    .badge{display:inline-flex;align-items:center;padding:4px 10px;border:1px solid var(--line);border-radius:999px;background:rgba(255,255,255,.03);font-size:10px;font-weight:700;color:var(--muted2);white-space:nowrap}

    /* ── Sections ───────────────────────────────────────────────────────── */
    .doc-section{margin-bottom:24px}
    .section-title{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--line)}

    /* ── IO section labels ──────────────────────────────────────────────── */
    .io-section-label{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.06em;margin:8px 0 6px;display:flex;align-items:center;gap:6px}
    .io-required-label{color:#22d97a}
    .io-optional-label{color:var(--muted)}

    /* ── IO card ────────────────────────────────────────────────────────── */
    .io-card{padding:10px 12px;border:1px solid var(--line);border-radius:10px;background:rgba(255,255,255,.02);margin-bottom:6px}
    .io-card-top{display:flex;align-items:center;flex-wrap:wrap;gap:6px;margin-bottom:0}
    .io-card:has(.io-desc) .io-card-top{margin-bottom:6px}
    .io-key{font-size:12px;font-family:'Geist Mono',monospace;font-weight:700;color:var(--blue);background:rgba(29,140,255,.08);padding:2px 7px;border-radius:5px;border:1px solid rgba(29,140,255,.2)}
    .io-label{font-size:12px;font-weight:600;color:var(--text);flex:1;min-width:0}
    .io-chips{display:flex;gap:4px;flex-wrap:wrap;margin-left:auto}
    .io-desc{font-size:11px;color:var(--muted2);line-height:1.55;padding-top:4px;border-top:1px solid var(--line)}

    /* ── Type & unit badges ─────────────────────────────────────────────── */
    .type-badge{font-size:10px;font-weight:700;padding:2px 7px;border-radius:999px;border:1px solid;font-family:'Geist Mono',monospace;white-space:nowrap}
    .unit-chip{font-size:10px;color:var(--muted);background:rgba(255,255,255,.05);border:1px solid var(--line);padding:2px 7px;border-radius:999px;font-family:'Geist Mono',monospace}

    /* ── Settings group ─────────────────────────────────────────────────── */
    .sp-group{margin-bottom:16px}
    .sp-group-title{font-size:11px;font-weight:800;color:var(--muted2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px;padding:4px 0}

    /* ── Setpoint card ──────────────────────────────────────────────────── */
    .sp-card{padding:9px 12px;border:1px solid var(--line);border-radius:10px;background:rgba(255,255,255,.02);margin-bottom:5px}
    .sp-card-top{display:flex;align-items:center;flex-wrap:wrap;gap:5px}
    .sp-card:has(.sp-help) .sp-card-top{margin-bottom:6px}
    .sp-key{font-size:11px;font-family:'Geist Mono',monospace;font-weight:700;color:var(--orange);background:rgba(255,154,58,.08);padding:2px 6px;border-radius:5px;border:1px solid rgba(255,154,58,.2)}
    .sp-label{font-size:12px;font-weight:600;color:var(--text);flex:1;min-width:0}
    .sp-chips{display:flex;gap:4px;flex-wrap:wrap;margin-left:auto;align-items:center}
    .sp-type{font-size:10px;color:var(--muted);background:rgba(255,255,255,.05);border:1px solid var(--line);padding:2px 6px;border-radius:999px;font-family:'Geist Mono',monospace}
    .sp-default{font-size:10px;color:var(--muted2);background:rgba(255,255,255,.04);border:1px solid var(--line);padding:2px 7px;border-radius:999px;font-family:'Geist Mono',monospace}
    .sp-options{font-size:10px;color:#a855f7;background:rgba(168,85,247,.08);border:1px solid rgba(168,85,247,.25);padding:2px 7px;border-radius:999px;font-family:'Geist Mono',monospace;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .sp-help{font-size:11px;color:var(--muted2);line-height:1.55;padding-top:5px;border-top:1px solid var(--line);display:flex;gap:6px;align-items:flex-start}
    .sp-help-icon{font-size:12px;flex-shrink:0;margin-top:1px}

    /* ── Commands ───────────────────────────────────────────────────────── */
    .commands-grid{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:8px}
    .cmd-chip{padding:5px 12px;border:1px solid var(--line);border-radius:8px;background:rgba(255,255,255,.03);font-size:12px}
    .cmd-note{font-size:11px;color:var(--muted2);line-height:1.5}

    /* ── Misc ───────────────────────────────────────────────────────────── */
    .emptyState{color:var(--muted2);text-align:center;padding:24px}

    @media(max-width:1100px){
      .help-grid{grid-template-columns:1fr}
      .help-list,.help-detail-wrap{height:auto;max-height:60vh}
    }
  </style>
  <script defer src="/theme.js?v=1"></script>
  <script defer src="/role-ui.js?v=2"></script>
  <script defer src="/help.js?v=4"></script>
</head>
<body>
<div class="app">
  <aside class="side" id="sidebar">
    <div class="brand">
      <img class="brandLogo" src="/logo.png" alt="ELARIS" onerror="this.style.display='none'">
      <div class="brandText"><div class="name">ELARIS</div><div class="tagline">Module Help</div></div>
    </div>
    <div class="groupTitle">Main</div>
    <nav class="nav"><a href="/">&#127968; Dashboard</a></nav>
    <div class="groupTitle">System</div>
    <nav class="nav">
      <a href="/scenes.html">&#127916; Scenes</a>
      <a href="/settings.html">&#9881;&#65039; Settings</a>
      <a href="/entities.html">&#128268; Entities</a>
      <a href="/installer.html">&#128295; Installer</a>
      <a href="/modules.html">&#129513; Modules</a>
      <a href="/logs.html">&#128203; Logs</a>
      <a href="/esphome.html">&#128376; ESPHome</a>
      <a href="/help.html" class="active">&#10067; Help</a>
    </nav>
  </aside>
  <div style="display:flex;flex-direction:column;flex:1;overflow:hidden;min-width:0">
    <div class="topbar" style="margin:12px 16px 0;flex-shrink:0">
      <div>
        <div style="font-size:24px;font-weight:900;line-height:1">Module Help</div>
        <div class="muted2" style="margin-top:3px;font-size:12px">Each module's inputs, outputs, and what every setting actually does.</div>
      </div>
      <div class="actions">
        <input id="q" class="txt" type="search" placeholder="Search modules, IO, settings..." style="min-width:260px">
        <select id="cat" class="sel"><option value="">All categories</option></select>
        <button class="btn" id="themeBtn" onclick="toggleTheme()">&#127769;</button>
        <a class="btn" href="/">Dashboard</a>
      </div>
    </div>
    <div class="help-grid" style="overflow:hidden">
      <div class="card" style="padding:14px;overflow:hidden">
        <div class="cardTitle" style="margin-bottom:8px"><span>Modules</span><span id="countBadge" class="mutedInline">0 modules</span></div>
        <div id="moduleList" class="help-list"></div>
      </div>
      <div class="card" style="padding:0;overflow:hidden">
        <div id="detail" class="help-detail-wrap"></div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
