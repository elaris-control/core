<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<script>try{document.documentElement.dataset.theme=localStorage.getItem("elaris_theme")||"dark";}catch(e){document.documentElement.dataset.theme="dark";}</script>
  <script src="/csrf.js?v=1"></script>
  <script src="/js/core.js?v=1"></script>
<title>ELARIS — Modules</title>
<link rel="icon" href="/favicon.ico">
  <link rel="manifest" href="/manifest.json">
  <link rel="stylesheet" href="/styles.css?v=22">
  <link rel="stylesheet" href="/mobile-nav.css">
<style>
.page{max-width:1200px;margin:0 auto;padding:24px 20px 80px}
.hdr{display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:28px;flex-wrap:wrap}
.hdr-left{display:flex;align-items:center;gap:14px}
.logo-sm{width:38px;height:38px;object-fit:contain;filter:drop-shadow(0 0 8px rgba(255,104,32,.35))}
.hdr-title{font-size:20px;font-weight:900}
.hdr-title span{background:linear-gradient(90deg,var(--blue) 0%,var(--orange) 100%);-webkit-background-clip:text;background-clip:text;color:transparent}
.hdr-sub{font-size:12px;color:var(--muted);font-family:'Geist Mono',monospace;margin-top:2px}
.section-title{font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:14px;padding-bottom:8px;border-bottom:1px solid var(--line)}

/* Category tabs */
.cat-tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px}
.cat-tab{padding:6px 14px;border-radius:999px;border:1px solid var(--line2);background:rgba(255,255,255,.04);color:var(--muted2);font-size:12px;font-weight:700;cursor:pointer;transition:all .15s}
.cat-tab:hover{background:rgba(255,255,255,.08)}
.cat-tab.active{background:rgba(29,140,255,.15);border-color:rgba(29,140,255,.4);color:var(--blue)}

/* Module definition cards */
.def-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:12px;margin-bottom:32px}
.def-card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:18px;cursor:pointer;transition:all .18s;position:relative;overflow:hidden}
.def-card::before{content:"";position:absolute;top:0;left:0;right:0;height:3px;background:var(--card-accent,var(--blue))}
.def-card:hover{border-color:var(--line2);transform:translateY(-2px);box-shadow:0 8px 32px rgba(0,0,0,.4)}
.def-card.selected{border-color:var(--card-accent,var(--blue));box-shadow:0 0 0 2px var(--card-accent,#1d8cff)33}
.def-icon{font-size:28px;margin-bottom:10px}
.def-name{font-weight:800;font-size:14px;margin-bottom:5px}
.def-desc{font-size:11px;color:var(--muted2);line-height:1.5}
.def-meta{margin-top:8px;font-size:10px;font-family:'Geist Mono',monospace;color:var(--muted)}

/* Instances */
.inst-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px}
.inst-card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:18px;position:relative;overflow:hidden}
.inst-card::before{content:"";position:absolute;top:0;left:0;right:0;height:2px;background:var(--card-accent,var(--blue))}
.inst-header{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:12px}
.inst-icon-name{display:flex;align-items:center;gap:10px}
.inst-icon{font-size:22px}
.inst-name{font-weight:800;font-size:14px}
.inst-module-label{font-size:11px;color:var(--muted2);margin-top:2px;font-family:'Geist Mono',monospace}
.inst-actions{display:flex;gap:6px}
.map-list{display:flex;flex-direction:column;gap:4px;margin-bottom:12px}
.map-item{display:flex;justify-content:space-between;align-items:flex-start;font-size:12px;padding:5px 0;border-top:1px solid var(--line);gap:10px}
.map-item:first-child{border-top:none}
.map-key{color:var(--muted2);font-family:'Geist Mono',monospace;flex:0 0 auto}
.map-val{font-weight:700;text-align:right;max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.map-val.unmapped{color:var(--muted);font-style:italic}
.map-val.rich{max-width:250px;white-space:normal;overflow:visible;text-overflow:clip;display:flex;justify-content:flex-end;flex-wrap:wrap;gap:4px;line-height:1.35}
.compact-badge{display:inline-flex;align-items:center;gap:5px;padding:2px 7px;border-radius:999px;border:1px solid var(--line2);background:rgba(255,255,255,.04);font-size:10px;font-weight:700}
.compact-badge .k{color:var(--muted2);font-family:'Geist Mono',monospace;font-size:9px;letter-spacing:.04em;text-transform:uppercase}
.compact-badge .v{color:var(--text)}
.compact-badge.live-on{border-color:rgba(34,217,122,.28);background:rgba(34,217,122,.08)}
.compact-badge.live-on .v{color:#22d97a}
.compact-badge.live-off{border-color:rgba(255,255,255,.12);background:rgba(255,255,255,.03)}
.compact-badge.live-off .v{color:var(--muted2)}
.auto-badge{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:700;padding:2px 7px;border-radius:999px}
.auto-badge.running{background:rgba(34,217,122,.12);color:#22d97a;border:1px solid rgba(34,217,122,.3)}
.auto-badge.paused{background:rgba(148,163,184,.08);color:var(--muted);border:1px solid rgba(148,163,184,.2)}

/* Setpoints panel */
.sp-panel{margin-top:10px;padding:12px;background:rgba(255,255,255,.03);border:1px solid var(--line);border-radius:var(--radius-sm)}
.sp-title{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
.sp-row{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:5px 0;border-top:1px solid var(--line)}
.sp-row:first-of-type{border-top:none}
.sp-label{font-size:12px;color:var(--muted2);font-weight:600;flex:1}
.sp-ctrl{display:flex;align-items:center;gap:6px}
.sp-input{width:65px;padding:4px 8px;border-radius:6px;border:1px solid var(--line2);background:rgba(255,255,255,.05);color:var(--text);font-family:'Geist Mono',monospace;font-size:12px;font-weight:700;text-align:center;outline:none}
.sp-input:focus{border-color:var(--blue)}
.sp-select{padding:4px 8px;border-radius:6px;border:1px solid var(--line2);background:rgba(255,255,255,.05);color:var(--text);font-size:12px;font-weight:700;outline:none;cursor:pointer}
.sp-unit{font-size:10px;color:var(--muted);min-width:22px}
.sp-btn{font-size:10px;padding:3px 9px}

.sp-group { border: none; margin: 0; padding: 0; }
.sp-group + .sp-group { margin-top: 6px; }
.sp-group summary {
  list-style: none;
  font-size: 10px; font-weight: 700; letter-spacing: 1.5px;
  text-transform: uppercase; color: var(--muted);
  padding: 7px 4px; cursor: pointer; display: flex;
  align-items: center; gap: 6px; user-select: none;
  border-top: 1px solid var(--line);
}
.sp-group summary::-webkit-details-marker { display: none; }
.sp-group summary::before {
  content: "▶"; font-size: 8px; transition: transform .15s;
  display: inline-block; color: var(--muted);
}
.sp-group[open] summary::before { transform: rotate(90deg); }
.sp-group summary:hover { color: var(--text); }
.sp-group:first-child summary { border-top: none; }

/* Log */
.log-row{display:flex;gap:8px;align-items:center;padding:4px 0;border-top:1px solid var(--line);font-size:10px;font-family:'Geist Mono',monospace}
.log-row:first-child{border-top:none}
.log-ts{color:var(--muted);white-space:nowrap}
.log-action{font-weight:700}
.log-action.pump_ON,.log-action.ac_relay_ON,.log-action.output_1_ON,.log-action.relay_open_ON{color:#22d97a}
.log-action.pump_OFF,.log-action.ac_relay_OFF,.log-action.output_1_OFF,.log-action.relay_close_ON{color:#ff4545}

/* Wizard */
.wizard{display:none}
.wizard.show{display:block}
.wizard-card{background:var(--card);border:1px solid var(--line2);border-radius:var(--radius);padding:24px;margin-bottom:20px}
.wizard-title{font-size:16px;font-weight:800;margin-bottom:4px}
.wizard-sub{font-size:13px;color:var(--muted2);margin-bottom:18px}
.input-row{display:grid;grid-template-columns:1fr 1fr;gap:10px 20px;align-items:center;padding:10px 0;border-top:1px solid var(--line)}
.input-row:first-of-type{border-top:none}
.input-label{font-weight:700;font-size:13px}
.input-label .req{color:var(--bad);margin-left:3px}
.input-label .opt{color:var(--muted);font-size:11px;font-weight:600}
.input-type{font-size:10px;color:var(--muted);font-family:'Geist Mono',monospace}
.match-badge{font-size:10px;font-weight:700;padding:2px 7px;border-radius:999px;margin-left:6px;vertical-align:middle}
.match-badge.auto{background:rgba(34,217,122,.15);color:#22d97a;border:1px solid rgba(34,217,122,.3)}
.map-sel{padding:8px 10px;border-radius:var(--radius-sm);border:1px solid var(--line2);background:rgba(255,255,255,.04);color:var(--text);font-size:13px;font-weight:600;width:100%;outline:none;cursor:pointer}
.map-sel:focus{border-color:var(--blue)}
.map-sel.auto-matched{border-color:rgba(34,217,122,.4);background:rgba(34,217,122,.06)}
option{background:#0d1221;color:var(--text)}
.name-field{padding:10px 14px;border-radius:var(--radius-sm);border:1px solid var(--line2);background:rgba(255,255,255,.04);color:var(--text);font-size:14px;font-weight:600;outline:none;width:100%}
.name-field:focus{border-color:var(--blue)}

/* Thermostat mapping wizard */
.thermo-note{margin:0 0 14px;padding:12px 14px;border-radius:var(--radius-sm);border:1px solid rgba(29,140,255,.22);background:rgba(29,140,255,.08);font-size:12px;color:var(--muted2);line-height:1.55}
.thermo-note strong{color:var(--text)}
.wizard-group{margin-bottom:16px;border:1px solid var(--line);border-radius:var(--radius-sm);background:rgba(255,255,255,.025);overflow:hidden}
.wizard-group > summary{list-style:none;cursor:pointer;padding:12px 14px;display:flex;align-items:center;justify-content:space-between;gap:10px;font-weight:800;font-size:12px;letter-spacing:.04em;text-transform:uppercase;color:var(--text);background:rgba(255,255,255,.03)}
.wizard-group > summary::-webkit-details-marker{display:none}
.wizard-group > summary::after{content:"▶";font-size:10px;color:var(--muted);transition:transform .15s ease}
.wizard-group[open] > summary::after{transform:rotate(90deg)}
.wizard-group-body{padding:0 14px 14px}
.wizard-group-hint{font-size:11px;color:var(--muted2);margin:-2px 0 10px;line-height:1.45}
.zone-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:12px}
.zone-card{border:1px solid var(--line);border-radius:var(--radius-sm);background:rgba(255,255,255,.02);padding:12px}
.zone-card.active{border-color:rgba(29,140,255,.35);box-shadow:0 0 0 1px rgba(29,140,255,.12) inset}
.zone-toolbar{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;margin-bottom:10px}
.zone-toolbar-actions{display:flex;gap:8px;flex-wrap:wrap}
.zone-head{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:6px}
.zone-title{font-weight:800;font-size:13px}
.zone-meta{font-size:10px;font-family:'Geist Mono',monospace;color:var(--muted)}
.zone-badge{display:inline-flex;align-items:center;gap:4px;border-radius:999px;padding:2px 8px;font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.04em;border:1px solid var(--line2);color:var(--muted2);background:rgba(255,255,255,.04)}
.zone-badge.active{color:var(--blue);border-color:rgba(29,140,255,.35);background:rgba(29,140,255,.12)}
.zone-hint{font-size:11px;color:var(--muted2);line-height:1.45;margin-bottom:8px}
.input-row.compact{padding:8px 0}
@media(max-width:700px){.zone-grid{grid-template-columns:1fr}}


.thermo-summary{margin:0 0 14px;padding:12px 14px;border-radius:var(--radius-sm);border:1px solid rgba(255,201,71,.2);background:rgba(255,201,71,.05)}
.thermo-summary-head{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;margin-bottom:10px}
.thermo-summary-title{font-size:11px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:#ffd978}
.thermo-summary-sub{font-size:12px;color:var(--muted2)}
.thermo-sum-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:8px;margin-bottom:10px}
.thermo-stat{padding:9px 10px;border-radius:10px;border:1px solid var(--line);background:rgba(255,255,255,.03)}
.thermo-stat-k{font-size:10px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:3px}
.thermo-stat-v{font-size:15px;font-weight:900;color:var(--text)}
.thermo-zone-sum{display:flex;flex-wrap:wrap;gap:6px;margin:8px 0 0}
.thermo-zone-pill{display:inline-flex;align-items:center;gap:6px;padding:4px 9px;border-radius:999px;border:1px solid var(--line2);background:rgba(255,255,255,.04);font-size:11px;font-weight:700}
.thermo-zone-pill .mini{font-size:10px;color:var(--muted2);font-weight:600}
.thermo-issues{display:flex;flex-direction:column;gap:6px;margin-top:10px}
.thermo-issue{padding:8px 10px;border-radius:10px;font-size:12px;line-height:1.45;border:1px solid var(--line)}
.thermo-issue strong{font-weight:800}
.thermo-issue.sev-bad{border-color:rgba(255,69,69,.28);background:rgba(255,69,69,.07);color:#ffd3d3}
.thermo-issue.sev-warn{border-color:rgba(255,201,71,.28);background:rgba(255,201,71,.07);color:#ffe9a8}
.thermo-issue.sev-info{border-color:rgba(29,140,255,.28);background:rgba(29,140,255,.07);color:#beddff}

/* Custom Rule Builder */
.rule-card{background:rgba(168,85,247,.05);border:1px solid rgba(168,85,247,.2);border-radius:var(--radius-sm);padding:14px;margin-bottom:10px}
.rule-header{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.rule-name-input{flex:1;padding:6px 10px;border-radius:6px;border:1px solid var(--line2);background:rgba(255,255,255,.05);color:var(--text);font-size:13px;font-weight:700;outline:none}
.cond-row{display:grid;grid-template-columns:1fr 80px 80px;gap:8px;margin-bottom:6px;align-items:center}
.cond-sel,.cond-input{padding:6px 8px;border-radius:6px;border:1px solid var(--line2);background:rgba(255,255,255,.04);color:var(--text);font-size:12px;font-weight:600;outline:none;width:100%}
.cond-sel:focus,.cond-input:focus{border-color:var(--purple,#a855f7)}
.logic-toggle{display:flex;gap:6px;margin:8px 0}
.logic-btn{padding:4px 12px;border-radius:999px;border:1px solid var(--line2);background:rgba(255,255,255,.04);color:var(--muted2);font-size:11px;font-weight:700;cursor:pointer}
.logic-btn.active{background:rgba(168,85,247,.15);border-color:rgba(168,85,247,.4);color:#a855f7}
.action-row{display:grid;grid-template-columns:1fr 100px;gap:8px;margin-bottom:6px}

/* Buttons */
.btn{border:1px solid var(--line2);cursor:pointer;padding:9px 16px;border-radius:var(--radius-sm);font-weight:700;font-size:13px;font-family:'Outfit',sans-serif;background:rgba(255,255,255,.05);color:var(--text);transition:all .15s}
.btn:hover{background:rgba(255,255,255,.09)}
.btn:active{transform:scale(.97)}
.btn-sm{padding:6px 11px;font-size:11px}
.btn-xs{padding:3px 8px;font-size:10px}
.btn-primary{background:linear-gradient(135deg,var(--blue2,#0ea5e9) 0%,var(--blue) 55%,var(--orange) 100%);border-color:transparent;color:#fff;box-shadow:0 4px 18px rgba(29,140,255,.22)}
.btn-primary:hover{filter:brightness(1.1)}
.btn-danger{border-color:rgba(255,69,69,.3);color:var(--bad);background:rgba(255,69,69,.07)}
.btn-danger:hover{background:rgba(255,69,69,.15)}
.btn-purple{border-color:rgba(168,85,247,.3);color:#a855f7;background:rgba(168,85,247,.07)}

.empty-state{text-align:center;padding:36px 20px;color:var(--muted)}
.empty-icon{font-size:36px;margin-bottom:10px}
.empty-text{font-size:14px;font-weight:600}

.toast-wrap{position:fixed;bottom:24px;right:24px;z-index:999;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.toast{padding:10px 16px;border-radius:var(--radius-sm);font-size:12px;font-weight:700;background:var(--card);border:1px solid var(--line2);box-shadow:var(--shadow-sm);animation:toastIn .2s ease;font-family:'Geist Mono',monospace}
.toast.ok{border-color:rgba(34,217,122,.35);color:#22d97a;background:rgba(34,217,122,.08)}
.toast.err{border-color:rgba(255,69,69,.35);color:var(--bad);background:rgba(255,69,69,.08)}
@keyframes toastIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
@media(max-width:640px){.def-grid{grid-template-columns:1fr 1fr}.input-row{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="page">
  <div class="hdr">
    <div class="hdr-left">
      <img class="logo-sm" src="/logo.png" alt="ELARIS">
      <div>
        <div class="hdr-title"><span>ELARIS</span> Modules</div>
        <div class="hdr-sub">Smart automation for every system</div>
      </div>
    </div>
    <div class="actions">
      <a href="/help.html" class="btn">Help</a>
      <button class="btn" id="themeBtn" onclick="toggleTheme()">🌙</button>
      <a href="/" class="btn">← Dashboard</a>
    </div>
  </div>

  <!-- Active instances -->
  <div class="section-title">Active Modules <span id="instCount" style="color:var(--muted);font-weight:600"></span></div>
  <div id="instGrid" class="inst-grid" style="margin-bottom:32px">
    <div class="empty-state"><div class="empty-icon">📦</div><div class="empty-text">No modules added yet.</div></div>
  </div>

  <!-- Add module -->
  <div class="section-title">Add Module</div>

  <!-- Category filter tabs -->
  <div class="cat-tabs" id="catTabs"></div>

  <!-- Module cards -->
  <div class="def-grid" id="defGrid"></div>

  <!-- Wizard -->
  <div class="wizard" id="wizard">
    <div class="wizard-card">
      <div id="wizardTitle" class="wizard-title"></div>
      <div id="wizardSub"   class="wizard-sub"></div>

      <div style="margin-bottom:16px">
        <label class="section-title" style="display:block;margin-bottom:8px">Instance Name</label>
        <input class="name-field" id="wizardName" placeholder="e.g. Living Room AC">
      </div>

      <div class="section-title">Map Inputs</div>
      <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin:-4px 0 12px">
        <input class="sp-input" id="mapIOQueryInput" placeholder="Search IO (device / key / name / zone)" 
               style="flex:1;min-width:240px" oninput="mapIOQuery=this.value; renderWizardInputs(_lastMappings||{});">
        <select class="sp-input" id="mapZoneFilterSelect" style="width:220px"
                onchange="mapZoneFilter=this.value; renderWizardInputs(_lastMappings||{});">
          <option value="">All zones</option>
        </select>
        <button class="btn btn-sm" onclick="mapIOQuery=''; mapZoneFilter=''; document.getElementById('mapIOQueryInput').value=''; document.getElementById('mapZoneFilterSelect').value=''; renderWizardInputs(_lastMappings||{});">Clear</button>
      </div>
      <div id="wizardInputs"></div>

      <div style="display:flex;gap:10px;margin-top:18px;justify-content:flex-end">
        <button class="btn" onclick="cancelWizard()">Cancel</button>
        <button class="btn btn-primary" id="wizardSaveBtn" onclick="saveModule()">💾 Save Module</button>
      </div>
    </div>
  </div>
</div>

<div class="toast-wrap" id="toastWrap"></div>

<script src="/site-context.js?v=1"></script>
<script src="/role-ui.js?v=2"></script>
<script src="/modules.shared.js?v=1"></script>
<script src="/js/modules/registry.js?v=1"></script>
<script src="/js/modules/mod_thermostat.js?v=1"></script>
<script src="/js/modules/mod_lighting.js?v=1"></script>
<script src="/js/modules/mod_solar.js?v=1"></script>
<script src="/js/modules/mod_energy.js?v=1"></script>
<script src="/js/modules/mod_irrigation.js?v=1"></script>
<script src="/js/modules/mod_hydronic.js?v=1"></script>
<script src="/js/modules/mod_pool_spa.js?v=1"></script>
<script src="/js/modules/mod_presence.js?v=1"></script>
<script src="/js/modules/mod_water_manager.js?v=1"></script>
<script src="/js/modules/mod_load_shifter.js?v=1"></script>
<script src="/js/modules/mod_maintenance.js?v=1"></script>
<script src="/js/modules/mod_smart_lighting.js?v=1"></script>
<script src="/js/modules/mod_custom.js?v=1"></script>
<script src="/js/modules/mod_basic_light.js?v=1"></script>
<script src="/js/modules/mod_motion_light.js?v=1"></script>
<script src="/js/modules/mod_daylight_light.js?v=1"></script>
<script src="/js/modules/mod_scheduled_light.js?v=1"></script>
<script src="/js/modules/mod_motion_daylight.js?v=1"></script>
<script src="/js/modules/mod_scheduled_motion.js?v=1"></script>
<script src="/js/modules/rules.js?v=1"></script>
<script src="/js/modules/scenarios.js?v=1"></script>
<script>
// ── State ─────────────────────────────────────────────────────────────────
let defs = [], instances = [], siteIO = [], siteId = null, selectedDef = null, suggestions = {};
let mapIOQuery = "", mapZoneFilter = "";
let ruleIOQuery = "", ruleZoneFilter = "";
let activeCat = "all", editingId = null;

// ── Shared helpers moved to /public/modules.shared.js ─────────────────────
function moduleSettingsEndpoint(instOrId) {
  const id = typeof instOrId === "object" ? instOrId?.id : instOrId;
  return `/api/automation/settings/${id}`;
}

function moduleLogEndpoint(instOrId) {
  const id = typeof instOrId === "object" ? instOrId?.id : instOrId;
  return `/api/automation/log/${id}`;
}

function getMapDisplayValue(map) {
  return map?.io_name || (map?.io_key ? `${map.group_name}.${map.io_key}` : null);
}

function escapeHtml(str) {
  return String(str ?? '').replace(/[&<>"']/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]));
}

function renderMapItem(label, value, key, opts={}) {
  const rich = !!opts.rich;
  const cls = `map-val ${value?"":"unmapped"}${rich?" rich":""}`;
  return `<div class="map-item">
    <span class="map-key">${label || key}</span>
    <span class="${cls}">${value||"— not set —"}</span>
  </div>`;
}

function renderCompactBadge(label, value, extraClass = "") {
  return `<span class="compact-badge ${extraClass}"><span class="k">${escapeHtml(label)}</span><span class="v">${escapeHtml(value)}</span></span>`;
}

function stateOn(v) {
  return v === true || v === 1 || v === "1" || String(v || "").toUpperCase() === "ON" || String(v || "").toUpperCase() === "TRUE";
}

function renderInstanceMapRows(inst, def, maps) {
  if (inst?.module_id === 'thermostat' && def) {
    const byKey = (key) => maps.find(x => x.input_key === key);
    const compactValue = (key) => getMapDisplayValue(byKey(key));
    const compactParts = [];
    const zoneSummaries = [];
    const liveValues = inst?._liveStatus?.values || {};

    const centralVal = compactValue('central_pump');
    if (centralVal) {
      const centralLive = stateOn(liveValues.central_pump);
      const centralDisplay = renderCompactBadge('map', centralVal) + renderCompactBadge('live', centralLive ? 'ON' : 'OFF', centralLive ? 'live-on' : 'live-off');
      compactParts.push(renderMapItem('Central Pump', centralDisplay, 'central_pump', { rich:true }));
    }

    const legacyKeys = ['temp_room','ac_relay','temp_outdoor'];
    const legacyPairs = legacyKeys.map(key => {
      const input = (def.inputs||[]).find(i => i.key === key);
      const val = compactValue(key);
      return val ? `${input?.short_label || input?.label || key}: ${val}` : null;
    }).filter(Boolean);

    let activeZoneCount = 0;
    for (let i = 1; i <= 6; i++) {
      const tempVal = compactValue(`zone_${i}_temp`);
      const callVal = compactValue(`zone_${i}_call`);
      const outVal  = compactValue(`zone_${i}_output`);
      const pumpVal = compactValue(`zone_${i}_pump`);
      const pieces = [];
      if (tempVal) pieces.push(renderCompactBadge('temp', tempVal));
      if (callVal) pieces.push(renderCompactBadge('call', callVal));
      if (outVal) pieces.push(renderCompactBadge('out', outVal));
      if (pumpVal) pieces.push(renderCompactBadge('pump', pumpVal));
      if (pieces.length) {
        activeZoneCount += 1;
        zoneSummaries.push(renderMapItem(`Zone ${i}`, pieces.join(''), `zone_${i}`, { rich:true }));
      }
    }

    if (activeZoneCount) {
      compactParts.unshift(renderMapItem('Configured Zones', String(activeZoneCount), 'zones_count'));
    }

    const fullSections = [];
    if (centralVal) {
      const centralLive = stateOn(liveValues.central_pump);
      const centralFull = renderCompactBadge('map', centralVal) + renderCompactBadge('live', centralLive ? 'ON' : 'OFF', centralLive ? 'live-on' : 'live-off');
      fullSections.push(`<div class="sp-title" style="margin-bottom:6px">Shared</div>${renderMapItem('Central Pump', centralFull, 'central_pump', { rich:true })}`);
    }
    if (legacyPairs.length) {
      const legacyRows = legacyKeys.map(key => {
        const input = (def.inputs||[]).find(i => i.key === key);
        const val = compactValue(key);
        if (!val) return '';
        return renderMapItem(input?.label || key, val, key);
      }).filter(Boolean).join('');
      fullSections.push(`<div class="sp-title" style="margin:10px 0 6px">Legacy / Single Zone</div>${legacyRows}`);
    }
    if (zoneSummaries.length) {
      const zoneGroups = [];
      for (let i = 1; i <= 6; i++) {
        const zoneKeys = [`zone_${i}_temp`,`zone_${i}_call`,`zone_${i}_output`,`zone_${i}_pump`];
        const rows = zoneKeys.map(key => {
          const input = (def.inputs||[]).find(inp => inp.key === key);
          const val = compactValue(key);
          if (!val) return '';
          return renderMapItem(input?.label || key, val, key);
        }).filter(Boolean).join('');
        if (rows) zoneGroups.push(`<div class="sp-title" style="margin:10px 0 6px">Zone ${i}</div>${rows}`);
      }
      fullSections.push(zoneGroups.join(''));
    }

    const summaryHtml = [
      ...compactParts,
      ...zoneSummaries,
      ...(legacyPairs.length && !activeZoneCount ? [renderMapItem('Legacy', legacyPairs.join(' • '), 'legacy')] : [])
    ].join('');

    if (summaryHtml) {
      const detailsHtml = fullSections.length ? `
        <details class="thermo-compact-details" style="margin-top:8px">
          <summary style="cursor:pointer;color:var(--muted);font-size:11px;letter-spacing:.08em;text-transform:uppercase">Show full mappings</summary>
          <div style="margin-top:8px">${fullSections.join('')}</div>
        </details>` : '';
      return `${summaryHtml}${detailsHtml}`;
    }
  }

  // Fallback / generic rendering
  const mapInputs = (def?.dynamic && maps.length)
    ? maps.map(m => ({ key: m.input_key }))
    : (def?.inputs||[]);
  return mapInputs.map(input => {
    const m   = maps.find(x => x.input_key===input.key);
    const val = getMapDisplayValue(m);
    return renderMapItem(input.label || input.key, val, input.key);
  }).join("");
}


function ioLabelById(ioId) {
  const io = siteIO.find(x => Number(x.id) === Number(ioId));
  if (!io) return `IO ${Number(ioId)}`;
  return escapeHTML(`${io.device_id}·${io.group_name}.${io.key}`) + (io.name && io.name !== io.key ? ` (${escapeHTML(io.name)})` : '');
}

function ioFriendlyLabel(ioId) {
  const io = siteIO.find(x => Number(x.id) === Number(ioId));
  if (!io) return `IO ${Number(ioId)}`;
  return escapeHTML(io.name && io.name !== io.key ? io.name : io.key);
}

function collectCurrentWizardMappings() {
  const mappings = {};
  (selectedDef?.inputs || []).forEach(input => {
    const sel = document.getElementById('map_' + input.key);
    if (sel?.value) mappings[input.key] = Number(sel.value);
  });
  if (selectedDef?.dynamic) {
    dynSlots.forEach(slot => {
      const sel = document.getElementById('map_' + slot.key);
      if (sel?.value) mappings[slot.key] = Number(sel.value);
    });
  }
  return mappings;
}

function renderThermostatWizard(currentMappings={}, rowRenderer) {
  const legacyDefs = ['temp_room','ac_relay','temp_outdoor']
    .map(key => (selectedDef?.inputs||[]).find(inp => inp.key === key)).filter(Boolean);
  const sharedDefs = ['central_pump']
    .map(key => (selectedDef?.inputs||[]).find(inp => inp.key === key)).filter(Boolean);
  const suggestedCount = thermostatSuggestedVisibleZones(currentMappings);
  const visibleCount = editingId ? (thermostatVisibleZones || 1) : Math.max(thermostatVisibleZones || 1, suggestedCount);
  thermostatVisibleZones = visibleCount;

  let html = `<div class="thermo-note"><strong>Thermostat mapping</strong><br>Use <strong>zones</strong> for the normal setup. Add only the zone sensors/outputs you need. <strong>Central Pump</strong> is optional and turns ON when any active zone calls. The <strong>Legacy</strong> section is only for classic single-zone compatibility.</div>`;
  html += `<div id="thermoCommissioningSummary"></div>`;

  html += `<details class="wizard-group" open>
    <summary>Shared outputs</summary>
    <div class="wizard-group-body">
      <div class="wizard-group-hint">Optional outputs that apply to the whole thermostat instance.</div>
      ${sharedDefs.map(inp => rowRenderer(inp, false, 'compact')).join('')}
    </div>
  </details>`;

  html += `<details class="wizard-group" open>
    <summary>Zones</summary>
    <div class="wizard-group-body">
      <div class="wizard-group-hint">Each zone can use a room sensor or thermostat call input, plus optional zone valve/relay and optional zone pump.</div>
      <div class="zone-toolbar">
        <div class="wizard-group-hint" style="margin:0">Showing ${visibleCount} of 6 zones.</div>
        <div class="zone-toolbar-actions">
          ${visibleCount < 6 ? `<button type="button" class="btn ghost" onclick="setThermostatVisibleZones(${visibleCount + 1})">+ Add Zone</button>` : ''}
          ${visibleCount > suggestedCount ? `<button type="button" class="btn ghost" onclick="setThermostatVisibleZones(${Math.max(1, suggestedCount)})">Hide Empty</button>` : ''}
          ${visibleCount < 6 ? `<button type="button" class="btn ghost" onclick="setThermostatVisibleZones(6)">Show All</button>` : ''}
        </div>
      </div>
      <div class="zone-grid">`;
  for (let i = 1; i <= visibleCount; i++) {
    const { defs, active, mappedCount } = thermostatZoneState(i, currentMappings);
    const badge = active ? `<span class="zone-badge active">active</span>` : `<span class="zone-badge">optional</span>`;
    html += `<div class="zone-card ${active ? 'active' : ''}">
      <div class="zone-head">
        <div>
          <div class="zone-title">Zone ${i}</div>
          <div class="zone-meta">sensor / thermostat • output • pump</div>
        </div>
        ${badge}
      </div>
      <div class="zone-hint">${mappedCount ? `${mappedCount} mapping${mappedCount === 1 ? '' : 's'} selected or suggested.` : 'Leave empty if this zone is not used.'}</div>
      ${defs.map(inp => rowRenderer(inp, false, 'compact')).join('')}
    </div>`;
  }
  html += `</div></div></details>`;

  html += `<details class="wizard-group">
    <summary>Legacy / single-zone compatibility</summary>
    <div class="wizard-group-body">
      <div class="wizard-group-hint">Keep these only for older single-zone thermostat setups. For new installs, prefer Zone 1 above.</div>
      ${legacyDefs.map(inp => rowRenderer(inp, false, 'compact')).join('')}
    </div>
  </details>`;

  return html;
}

// ── Instance cards ────────────────────────────────────────────────────────
function renderInstances() {
  const grid  = document.getElementById("instGrid");
  const count = document.getElementById("instCount");
  count.textContent = instances.length ? `(${instances.length})` : "";

  if (!instances.length) {
    grid.innerHTML = `<div class="empty-state"><div class="empty-icon">📦</div><div class="empty-text">No modules added yet.</div></div>`;
    return;
  }

  grid.innerHTML = instances.map(inst => {
    const def   = inst.definition;
    const color = def?.color || "var(--blue)";
    const maps  = inst.mappings || [];
    const hasAuto = !!(ModuleRegistry[inst.module_id]?.hasAuto);

    const mapRows = renderInstanceMapRows(inst, def, maps);

    return `
    <div class="inst-card" style="--card-accent:${color}">
      <div class="inst-header">
        <div class="inst-icon-name">
          <div class="inst-icon">${def?.icon||"📦"}</div>
          <div>
            <div class="inst-name">${escapeHTML(inst.name||'')}
              ${hasAuto?`<span class="auto-badge running" id="badge_${inst.id}">⚡ auto</span>`:""}
            </div>
            <div class="inst-module-label">${escapeHTML(def?.name||inst.module_id||'')}</div>
          </div>
        </div>
        <div class="inst-actions">
          <button class="btn btn-sm" onclick="editInstance(${inst.id})">✎</button>
          <button class="btn btn-sm btn-danger" onclick="deleteInstance(${Number(inst.id)},${escapeHTML(JSON.stringify(String(inst.name||'')))})">✕</button>
        </div>
      </div>
      <div class="map-list" id="maps_${inst.id}">${mapRows}</div>
      <div id="sp_${inst.id}"><div style="color:var(--muted);font-size:11px;padding:6px 0">Loading…</div></div>
      <div id="log_${inst.id}"></div>
    </div>`;
  }).join("");

  // Async enrich
  instances.forEach(inst => enrichCard(inst));
}

// ── Enrich instance card with setpoints + log ─────────────────────────────
async function enrichCard(inst) {
  const def = inst.definition;
  if (!def?.setpoints?.length && !ModuleRegistry[inst.module_id]?.enrichCard) {
    document.getElementById(`sp_${inst.id}`).innerHTML = "";
    return;
  }

  // Load settings
  let settings = {};
  try {
    const d = await api(moduleSettingsEndpoint(inst));
    settings = d.settings || d.setpoints || {};
  } catch {}

  const spEl = document.getElementById(`sp_${inst.id}`);
  if (!spEl) return;

  try {
    inst._liveStatus = await api(`/api/automation/status/${inst.id}`);
  } catch {}
  if (inst.module_id === 'solar') {
    try { inst._liveStatus = await api(`/api/automation/solar/${inst.id}/status`); } catch {}
  }
  try {
    const mapsEl = document.getElementById(`maps_${inst.id}`);
    if (mapsEl) mapsEl.innerHTML = renderInstanceMapRows(inst, def, inst.mappings || []);
  } catch {}

  if (ModuleRegistry[inst.module_id]?.enrichCard) {
    await ModuleRegistry[inst.module_id].enrichCard(inst, settings, spEl);

  } else if (def?.setpoints?.length) {

    // ── Which IOs are actually mapped for this instance? ─────────────
    const mappedKeys = new Set(
      (inst.mappings || []).filter(m => m.io_id).map(m => m.input_key)
    );

    // ── Render grouped setpoints ─────────────────────────────────────
    // Modules that define groups get collapsible sections.
    // Modules without groups fall back to flat list (legacy behaviour).
    const groups = def.groups;

    let innerHTML = "";

    if (groups?.length) {
      innerHTML = groups.map(grp => {
        // Skip group if required IO is not mapped
        if (grp.requires && !mappedKeys.has(grp.requires)) return "";
        // Skip group if a conflicting IO IS mapped (e.g. pump_timers hidden when inverter active)
        if (grp.requires_absent && mappedKeys.has(grp.requires_absent)) return "";

        const sps = def.setpoints.filter(sp => (sp.group || "basic") === grp.id);
        if (!sps.length) return "";

        const rows = sps.map(sp => renderSetpointRow(inst.id, sp, settings)).join("");
        return `
          <details class="sp-group" ${grp.open ? "open" : ""}>
            <summary>${grp.label}</summary>
            ${rows}
          </details>`;
      }).join("");
    } else {
      // Legacy: flat list (non-solar modules)
      innerHTML = def.setpoints.map(sp => renderSetpointRow(inst.id, sp, settings)).join("");
    }

       const summaryHtml = ModuleRegistry[inst.module_id]?.renderSummary?.(inst, settings, inst._liveStatus) || '';
	   spEl.innerHTML = `
      <div class="sp-panel">
        <div class="sp-title">⚙️ Setpoints</div>
        ${summaryHtml}
        ${innerHTML}
      </div>`;

  } else {
    spEl.innerHTML = "";
  }

  // Log (unchanged)
  try {
    const d = await api(moduleLogEndpoint(inst));
    const log = (d.log||[]).slice(0,4);
    const logEl = document.getElementById(`log_${inst.id}`);
    if (logEl && log.length) {
      logEl.innerHTML = `<div class="sp-panel" style="margin-top:8px">
        <div class="sp-title">📋 Recent Actions</div>
        ${log.map(l=>`<div class="log-row">
          <span class="log-ts">${new Date(l.ts).toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"})}</span>
          <span class="log-action ${escapeHtml(l.action)}">${escapeHtml(l.action)}</span>
          <span style="color:var(--muted2);font-size:10px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${escapeHtml(l.reason)}</span>
        </div>`).join("")}
      </div>`;
    }
  } catch {}
}



function renderBadge(text, color, border) {
  return `<span style="display:inline-flex;align-items:center;gap:4px;background:rgba(255,255,255,.04);border:1px solid ${border||'var(--line)'};border-radius:999px;padding:3px 8px;font-size:10px;font-weight:700;color:${color||'var(--text)'}">${escapeHTML(String(text ?? ''))}</span>`;
}

function renderSetpointRow(instId, sp, settings) {
  const val = settings[sp.key] ?? sp.default ?? "";
  const help = sp.help ? `<div class="sp-help" style="font-size:11px;color:var(--muted);margin-top:4px">${sp.help}</div>` : "";
  if (sp.type === "select") {
    const options = (sp.options || []).map(o => typeof o === 'object' ? o : { value: o, label: o });
    return `<div class="sp-row">
      <span class="sp-label">${sp.label}</span>
      <div class="sp-ctrl">
        <select class="sp-select" id="sp_${instId}_${sp.key}" onchange="saveSP(${instId},'${sp.key}',this.value)">
          ${options.map(o=>`<option value="${o.value}" ${String(val)===String(o.value)?"selected":""}>${o.label}</option>`).join("")}
        </select>
      </div>
      ${help}
    </div>`;
  }
  if (sp.type === "time") {
    return `<div class="sp-row">
      <span class="sp-label">${sp.label}</span>
      <div class="sp-ctrl">
        <input type="time" class="sp-input" style="width:85px" id="sp_${instId}_${sp.key}" value="${val}"
               onchange="saveSP(${instId},'${sp.key}',this.value)">
      </div>
      ${help}
    </div>`;
  }
  if (sp.type === "text") {
    return `<div class="sp-row">
      <span class="sp-label">${sp.label}</span>
      <div class="sp-ctrl">
        <input class="sp-input" type="text" id="sp_${instId}_${sp.key}" value="${val}">
        <button class="btn btn-xs sp-btn" onclick="saveSP(${instId},'${sp.key}',document.getElementById('sp_${instId}_${sp.key}').value)">Save</button>
      </div>
      ${help}
    </div>`;
  }
  return `<div class="sp-row">
    <span class="sp-label">${sp.label}</span>
    <div class="sp-ctrl">
      <input class="sp-input" type="number" step="${sp.step||1}" id="sp_${instId}_${sp.key}" value="${val}">
      <span class="sp-unit">${sp.unit||""}</span>
      <button class="btn btn-xs sp-btn" onclick="saveSP(${instId},'${sp.key}',document.getElementById('sp_${instId}_${sp.key}').value)">Save</button>
    </div>
    ${help}
  </div>`;
}

async function saveSP(instId, key, value) {
  try {
    await api(moduleSettingsEndpoint(instId), {
      method:"PATCH", body: JSON.stringify({key, value})
    });
    toast("✓ Saved");
  } catch(e) { toast("Error: "+e.message,"err"); }
}

async function toggleModuleTestMode(instId, currentValue) {
  const next = String(currentValue) === '1' ? '0' : '1';
  try {
    await api(moduleSettingsEndpoint(instId), {
      method:"PATCH", body: JSON.stringify({ key:'test_mode', value: next })
    });
    toast(next === '1' ? '✓ Test mode enabled' : '✓ Test mode disabled');
    await loadInstances();
  } catch(e) {
    toast("Error: " + e.message, "err");
  }
}



// ── Select def → wizard ───────────────────────────────────────────────────
async function selectDef(defId) {
  selectedDef = defs.find(d=>d.id===defId);
  if (!selectedDef) return;
  editingId = null;
  dynSlots = []; // reset dynamic slots for new module

  document.querySelectorAll(".def-card").forEach(c=>c.classList.remove("selected"));
  document.getElementById("def_"+defId)?.classList.add("selected");

  try {
    const s = await api(`/api/modules/suggest/${siteId}/${defId}`);
    suggestions = s.suggestions||{};
  } catch { suggestions={}; }

  document.getElementById("wizardTitle").textContent = `${selectedDef.icon} ${selectedDef.name}`;
  document.getElementById("wizardSub").textContent   = selectedDef.description;
  document.getElementById("wizardName").value        = selectedDef.name;
  document.getElementById("wizardSaveBtn").setAttribute("onclick","saveModule()");
  renderWizardInputs();

  const w = document.getElementById("wizard");
  w.classList.add("show");
  w.scrollIntoView({behavior:"smooth",block:"start"});
}

// Dynamic input slots state (for dynamic modules)
let dynSlots = []; // [{ key, prefix, label, type }]

function makeDynKey(prefix) {
  // Find a unique number — don't reuse numbers even if gaps exist
  const used = new Set(dynSlots.filter(s=>s.prefix===prefix).map(s=>{
    const n = parseInt(s.key.split('_').pop()); return isNaN(n)?0:n;
  }));
  let n = 1;
  while (used.has(n)) n++;
  return prefix + '_' + n;
}

// Capture current select values from DOM before re-rendering
function captureDomMappings() {
  const cur = Object.assign({}, _lastMappings||{});
  // Static inputs
  (selectedDef?.inputs||[]).forEach(inp => {
    const sel = document.getElementById('map_'+inp.key);
    if (sel?.value) cur[inp.key] = Number(sel.value);
    else if (sel) delete cur[inp.key];
  });
  // Dynamic slots
  dynSlots.forEach(s => {
    const sel = document.getElementById('map_'+s.key);
    if (sel?.value) cur[s.key] = Number(sel.value);
    else if (sel) delete cur[s.key];
  });
  return cur;
}

function addDynSlot(prefix) {
  const def = selectedDef;
  if (!def?.dynamic) return;
  const total = dynSlots.length;
  if (total >= (def.max_inputs||20)) { alert('Max '+(def.max_inputs||20)+' inputs reached'); return; }
  const tmpl = (def.input_templates||[]).find(t=>t.prefix===prefix);
  if (!tmpl) return;
  // Capture current state BEFORE re-render
  _lastMappings = captureDomMappings();
  const key = makeDynKey(prefix);
  dynSlots.push({ key, prefix, label: tmpl.label, type: tmpl.type, group: tmpl.group });
  renderWizardInputs(_lastMappings);
}

function removeDynSlot(key) {
  _lastMappings = captureDomMappings();
  dynSlots = dynSlots.filter(s=>s.key!==key);
  renderWizardInputs(_lastMappings);
}

let _lastMappings = {};

function renderWizardInputs(currentMappings={}) {
  _lastMappings = currentMappings;
  const sensors = siteIO.filter(e=>e.type==="sensor");
  const relays  = siteIO.filter(e=>e.type==="relay");
  const analog  = siteIO.filter(e=>["dimmer","ao","analog","pwm"].includes(e.type));
  const allIO   = siteIO;

  function pickList(t){
    if (t === "relay")  return { list: relays,  label: "relay"  };
    if (t === "sensor") return { list: sensors, label: "sensor" };
    if (t === "analog") return { list: analog,  label: "analog" };
    return { list: allIO, label: t||"io" };
  }

  function makeRow(input, isDynamic=false, rowClass="") {
    const p       = pickList(input.type);
    const opts    = p.list;
    const suggestedValue = !editingId ? suggestions[input.key] : null;
    const sug     = currentMappings[input.key] ?? suggestedValue;
    const fopts   = filterIOList(opts, mapIOQuery, mapZoneFilter, sug);

    const isAuto  = !editingId && !currentMappings[input.key] && suggestions[input.key];
    const selOpts = ['<option value="">— '+p.label+' —</option>',
      ...fopts.map(e=>'<option value="'+escHtml(e.id)+'" '+(String(e.id)===String(sug)?"selected":"")+'>'+escHtml(e.device_id)+'·'+escHtml(e.group_name)+'.'+escHtml(e.key)+(e.name&&e.name!==e.key?' ('+escHtml(e.name)+')':'')+'</option>')
    ].join("");
    const isEnabled = input.required || !!currentMappings[input.key] || (!editingId && !!suggestions[input.key]);
    return '<div class="input-row" id="irow_'+input.key+'" style="'+((!input.required && !isEnabled && !isDynamic) ? "opacity:.5" : "")+'">'+
      '<div>'+
      '<div class="input-label">'+
      (!input.required && !isDynamic ? '<input type="checkbox" id="toggle_'+input.key+'" '+(isEnabled?'checked':'')+' onchange="toggleOptInput(this,\''+input.key+'\')" style="margin-right:5px;cursor:pointer;vertical-align:middle">' : '')+
      input.label+
      (input.required ? '<span class="req">*</span>' : "")+
      (isAuto ? '<span class="match-badge auto">auto</span>' : "")+
      (isDynamic ? '<button data-key="'+input.key+'" onclick="removeDynSlot(this.dataset.key)" style="margin-left:8px;background:rgba(255,69,69,.15);border:1px solid rgba(255,69,69,.3);color:#ff6b6b;border-radius:4px;padding:1px 7px;font-size:10px;cursor:pointer">✕</button>' : '')+
      '</div>'+
      '<div class="input-type">'+input.type+(input.unit?' · '+input.unit:'')+' · key:'+input.key+'</div>'+
      '</div>'+
      '<select class="map-sel '+(isAuto?"auto-matched":"")+'" id="map_'+input.key+'"'+
      ((!input.required && !isEnabled && !isDynamic) ? " disabled" : "")+
      ' onchange="this.classList.remove(\'auto-matched\')">'+selOpts+'</select>'+
      '</div>';
  }

  const isDyn = !!(selectedDef?.dynamic);

  if (isDyn) {
    // Dynamic module: render existing dynSlots + add buttons per template
    const groups = {};
    dynSlots.forEach(s => {
      if (!groups[s.group]) groups[s.group] = [];
      groups[s.group].push(s);
    });

    const templates = selectedDef.input_templates || [];
    const outputTmpl = templates.filter(t=>t.group==='outputs');
    const inputTmpl  = templates.filter(t=>t.group==='inputs');

    let html = '';

    // Outputs section
    if (outputTmpl.length) {
      html += '<div style="font-size:10px;font-weight:800;letter-spacing:1px;color:var(--muted);text-transform:uppercase;margin:8px 0 4px">Outputs</div>';
      (groups['outputs']||[]).forEach(s => { html += makeRow({key:s.key,label:s.label,type:s.type,required:false}, true); });
      html += '<div style="display:flex;gap:6px;margin:6px 0 12px;flex-wrap:wrap">';
      outputTmpl.forEach(t => {
        html += '<button data-prefix="'+t.prefix+'" onclick="addDynSlot(this.dataset.prefix)" style="font-size:11px;padding:5px 12px;border-radius:7px;border:1px solid rgba(255,255,255,.15);background:rgba(255,255,255,.05);color:var(--muted2);cursor:pointer">+ '+t.label+'</button>';
      });
      html += '</div>';
    }

    // Inputs section
    if (inputTmpl.length) {
      html += '<div style="font-size:10px;font-weight:800;letter-spacing:1px;color:var(--muted);text-transform:uppercase;margin:8px 0 4px">Inputs / Sensors</div>';
      (groups['inputs']||[]).forEach(s => { html += makeRow({key:s.key,label:s.label,type:s.type,required:false}, true); });
      html += '<div style="display:flex;gap:6px;margin:6px 0 12px;flex-wrap:wrap">';
      inputTmpl.forEach(t => {
        html += '<button data-prefix="'+t.prefix+'" onclick="addDynSlot(this.dataset.prefix)" style="font-size:11px;padding:5px 12px;border-radius:7px;border:1px solid rgba(255,255,255,.15);background:rgba(255,255,255,.05);color:var(--muted2);cursor:pointer">+ '+t.label+'</button>';
      });
      html += '</div>';
    }

    if (!dynSlots.length) {
      html += '<div style="color:var(--muted);font-size:12px;padding:8px 0">Use the buttons above to add inputs and outputs.</div>';
    }

    const modSummaryBox = ModuleRegistry[selectedDef?.id]?.summaryBoxId;
    document.getElementById("wizardInputs").innerHTML = (modSummaryBox ? '<div id="'+modSummaryBox+'"></div>' : '') + html;
    if (modSummaryBox) ModuleRegistry[selectedDef?.id].updateCommissioningSummary(currentMappings);
  } else {
    if (selectedDef?.id === 'thermostat' || selectedDef?.id === 'zoned_thermostat') {
      renderThermostatWizardIntoDom(currentMappings, makeRow);
    } else if (ModuleRegistry[selectedDef?.id]?.renderWizardInputs) {
      ModuleRegistry[selectedDef?.id].renderWizardInputs(currentMappings, makeRow);
    } else {
      const modSummaryBox = ModuleRegistry[selectedDef?.id]?.summaryBoxId;
      const rows = (selectedDef?.inputs||[]).map(input => makeRow(input, false)).join("");
      document.getElementById("wizardInputs").innerHTML = (modSummaryBox ? '<div id="'+modSummaryBox+'"></div>' : '') + rows;
      if (modSummaryBox) ModuleRegistry[selectedDef?.id].updateCommissioningSummary(currentMappings);
    }
  }
}

function onWizardMapChanged() {
  ModuleRegistry[selectedDef?.id]?.updateCommissioningSummary?.();

function cancelWizard() {
  document.getElementById("wizard").classList.remove("show");
  document.querySelectorAll(".def-card").forEach(c=>c.classList.remove("selected"));
  selectedDef=null; editingId=null;
}
function toggleOptInput(checkbox, key) {
  const enabled = checkbox.checked;
  const row = document.getElementById("irow_" + key);
  const sel = document.getElementById("map_"  + key);
  if (!sel) return;

  sel.disabled      = !enabled;
  sel.style.opacity = enabled ? "" : "0.5";
  if (row) row.style.opacity = enabled ? "" : "0.5";

  // If unchecked → clear the selection so no mapping is sent
  if (!enabled) sel.value = "";
  onWizardMapChanged();
}

async function editInstance(id) {
  const inst = instances.find(i=>i.id===id);
  if (!inst) return;
  selectedDef = defs.find(d=>d.id===inst.module_id);
  if (!selectedDef) return;
  editingId = id;

  const curMap = {};
  (inst.mappings||[]).forEach(m=>{ if(m.io_id) curMap[m.input_key]=m.io_id; });

  // For dynamic modules, restore dynSlots from existing mappings
  dynSlots = [];
  const def2 = defs.find(d=>d.id===inst.module_id);
  thermostatVisibleZones = thermostatSuggestedVisibleZones(curMap);
  if (def2?.dynamic) {
    const tmpls = def2.input_templates || [];
    (inst.mappings||[]).forEach(m => {
      const tmpl = tmpls.find(t => m.input_key.startsWith(t.prefix+'_') || m.input_key === t.prefix);
      if (tmpl) dynSlots.push({ key: m.input_key, prefix: tmpl.prefix, label: tmpl.label, type: tmpl.type, group: tmpl.group });
    });
  }
  try {
    const s = await api(`/api/modules/suggest/${siteId}/${selectedDef.id}`);
    suggestions = s.suggestions||{};
  } catch { suggestions={}; }

  document.getElementById("wizardTitle").textContent = `✎ ${selectedDef.icon} ${inst.name}`;
  document.getElementById("wizardSub").textContent   = "Edit input mappings";
  document.getElementById("wizardName").value        = inst.name;
  document.getElementById("wizardSaveBtn").setAttribute("onclick",`saveModule(${id})`);

  document.querySelectorAll(".def-card").forEach(c=>c.classList.remove("selected"));
  renderWizardInputs(curMap);

  const w = document.getElementById("wizard");
  w.classList.add("show");
  w.scrollIntoView({behavior:"smooth",block:"start"});
}

async function deleteInstance(id, name) {
  if (!confirm(`Delete module "${name}"?`)) return;
  try {
    await api(`/api/modules/instances/${id}`,{method:"DELETE"});
    toast(`✓ "${name}" deleted`);
    await loadInstances();
  } catch(e) { toast("Error: "+e.message,"err"); }
}

async function loadInstances() {
  const d  = await api("/api/modules/instances" + (siteId ? ('?site_id=' + encodeURIComponent(siteId)) : '')); 
  instances = d.instances||[];
  renderInstances();
}

// ── Boot ──────────────────────────────────────────────────────────────────
(async function init() {
  try {
    const me = await api("/api/me");
    if (!me.ok||!me.user) { window.location.href="/login.html"; return; }

    try { siteId = Number(localStorage.getItem("elaris_site_id")||""); } catch {}
    if (!siteId) {
      const sites = await api("/api/sites");
      siteId = sites.sites?.[0]?.id;
    }
    if (!siteId) {
      document.querySelector(".page").innerHTML=`<div style="padding:40px;text-align:center;color:var(--muted)">No site found. <a href="/" style="color:var(--blue)">Go to Dashboard</a> first.</div>`;
      return;
    }

    const [defsRes, ioRes] = await Promise.all([
      api("/api/modules/definitions"),
      api(`/api/modules/io/${siteId}`)
    ]);

    defs   = defsRes.modules||[];
    siteIO = ioRes.io||[];
    refreshIOFilterSelects();

    // Get categories from definitions response (or build from modules)
    window._categories = defsRes.categories || [];
    renderCatTabs(window._categories);
    renderDefs();
    await loadInstances();

  } catch(e) {
    if (e.message.includes("401")||e.message.includes("not_auth")) {
      window.location.href="/login.html";
    } else console.error(e);
  }
})();
