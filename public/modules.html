<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<script>try{document.documentElement.dataset.theme=localStorage.getItem("elaris_theme")||"dark";}catch(e){document.documentElement.dataset.theme="dark";}</script>
  <script src="/csrf.js?v=1"></script>
<title>ELARIS — Modules</title>
<link rel="icon" href="/favicon.ico">
  <link rel="manifest" href="/manifest.json">
  <link rel="stylesheet" href="/styles.css?v=22">
<style>
.page{max-width:1200px;margin:0 auto;padding:24px 20px 80px}
.hdr{display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:28px;flex-wrap:wrap}
.hdr-left{display:flex;align-items:center;gap:14px}
.logo-sm{width:38px;height:38px;object-fit:contain;filter:drop-shadow(0 0 8px rgba(255,104,32,.35))}
.hdr-title{font-size:20px;font-weight:900}
.hdr-title span{background:linear-gradient(90deg,var(--blue) 0%,var(--orange) 100%);-webkit-background-clip:text;background-clip:text;color:transparent}
.hdr-sub{font-size:12px;color:var(--muted);font-family:'Geist Mono',monospace;margin-top:2px}
.section-title{font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:14px;padding-bottom:8px;border-bottom:1px solid var(--line)}

/* Category tabs */
.cat-tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px}
.cat-tab{padding:6px 14px;border-radius:999px;border:1px solid var(--line2);background:rgba(255,255,255,.04);color:var(--muted2);font-size:12px;font-weight:700;cursor:pointer;transition:all .15s}
.cat-tab:hover{background:rgba(255,255,255,.08)}
.cat-tab.active{background:rgba(29,140,255,.15);border-color:rgba(29,140,255,.4);color:var(--blue)}

/* Module definition cards */
.def-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:12px;margin-bottom:32px}
.def-card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:18px;cursor:pointer;transition:all .18s;position:relative;overflow:hidden}
.def-card::before{content:"";position:absolute;top:0;left:0;right:0;height:3px;background:var(--card-accent,var(--blue))}
.def-card:hover{border-color:var(--line2);transform:translateY(-2px);box-shadow:0 8px 32px rgba(0,0,0,.4)}
.def-card.selected{border-color:var(--card-accent,var(--blue));box-shadow:0 0 0 2px var(--card-accent,#1d8cff)33}
.def-icon{font-size:28px;margin-bottom:10px}
.def-name{font-weight:800;font-size:14px;margin-bottom:5px}
.def-desc{font-size:11px;color:var(--muted2);line-height:1.5}
.def-meta{margin-top:8px;font-size:10px;font-family:'Geist Mono',monospace;color:var(--muted)}

/* Instances */
.inst-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px}
.inst-card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:18px;position:relative;overflow:hidden}
.inst-card::before{content:"";position:absolute;top:0;left:0;right:0;height:2px;background:var(--card-accent,var(--blue))}
.inst-header{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:12px}
.inst-icon-name{display:flex;align-items:center;gap:10px}
.inst-icon{font-size:22px}
.inst-name{font-weight:800;font-size:14px}
.inst-module-label{font-size:11px;color:var(--muted2);margin-top:2px;font-family:'Geist Mono',monospace}
.inst-actions{display:flex;gap:6px}
.map-list{display:flex;flex-direction:column;gap:4px;margin-bottom:12px}
.map-item{display:flex;justify-content:space-between;align-items:flex-start;font-size:12px;padding:5px 0;border-top:1px solid var(--line);gap:10px}
.map-item:first-child{border-top:none}
.map-key{color:var(--muted2);font-family:'Geist Mono',monospace;flex:0 0 auto}
.map-val{font-weight:700;text-align:right;max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.map-val.unmapped{color:var(--muted);font-style:italic}
.map-val.rich{max-width:250px;white-space:normal;overflow:visible;text-overflow:clip;display:flex;justify-content:flex-end;flex-wrap:wrap;gap:4px;line-height:1.35}
.compact-badge{display:inline-flex;align-items:center;gap:5px;padding:2px 7px;border-radius:999px;border:1px solid var(--line2);background:rgba(255,255,255,.04);font-size:10px;font-weight:700}
.compact-badge .k{color:var(--muted2);font-family:'Geist Mono',monospace;font-size:9px;letter-spacing:.04em;text-transform:uppercase}
.compact-badge .v{color:var(--text)}
.compact-badge.live-on{border-color:rgba(34,217,122,.28);background:rgba(34,217,122,.08)}
.compact-badge.live-on .v{color:#22d97a}
.compact-badge.live-off{border-color:rgba(255,255,255,.12);background:rgba(255,255,255,.03)}
.compact-badge.live-off .v{color:var(--muted2)}
.auto-badge{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:700;padding:2px 7px;border-radius:999px}
.auto-badge.running{background:rgba(34,217,122,.12);color:#22d97a;border:1px solid rgba(34,217,122,.3)}
.auto-badge.paused{background:rgba(148,163,184,.08);color:var(--muted);border:1px solid rgba(148,163,184,.2)}

/* Setpoints panel */
.sp-panel{margin-top:10px;padding:12px;background:rgba(255,255,255,.03);border:1px solid var(--line);border-radius:var(--radius-sm)}
.sp-title{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
.sp-row{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:5px 0;border-top:1px solid var(--line)}
.sp-row:first-of-type{border-top:none}
.sp-label{font-size:12px;color:var(--muted2);font-weight:600;flex:1}
.sp-ctrl{display:flex;align-items:center;gap:6px}
.sp-input{width:65px;padding:4px 8px;border-radius:6px;border:1px solid var(--line2);background:rgba(255,255,255,.05);color:var(--text);font-family:'Geist Mono',monospace;font-size:12px;font-weight:700;text-align:center;outline:none}
.sp-input:focus{border-color:var(--blue)}
.sp-select{padding:4px 8px;border-radius:6px;border:1px solid var(--line2);background:rgba(255,255,255,.05);color:var(--text);font-size:12px;font-weight:700;outline:none;cursor:pointer}
.sp-unit{font-size:10px;color:var(--muted);min-width:22px}
.sp-btn{font-size:10px;padding:3px 9px}

.sp-group { border: none; margin: 0; padding: 0; }
.sp-group + .sp-group { margin-top: 6px; }
.sp-group summary {
  list-style: none;
  font-size: 10px; font-weight: 700; letter-spacing: 1.5px;
  text-transform: uppercase; color: var(--muted);
  padding: 7px 4px; cursor: pointer; display: flex;
  align-items: center; gap: 6px; user-select: none;
  border-top: 1px solid var(--line);
}
.sp-group summary::-webkit-details-marker { display: none; }
.sp-group summary::before {
  content: "▶"; font-size: 8px; transition: transform .15s;
  display: inline-block; color: var(--muted);
}
.sp-group[open] summary::before { transform: rotate(90deg); }
.sp-group summary:hover { color: var(--text); }
.sp-group:first-child summary { border-top: none; }

/* Log */
.log-row{display:flex;gap:8px;align-items:center;padding:4px 0;border-top:1px solid var(--line);font-size:10px;font-family:'Geist Mono',monospace}
.log-row:first-child{border-top:none}
.log-ts{color:var(--muted);white-space:nowrap}
.log-action{font-weight:700}
.log-action.pump_ON,.log-action.ac_relay_ON,.log-action.light_relay_ON,.log-action.output_1_ON,.log-action.relay_open_ON{color:#22d97a}
.log-action.pump_OFF,.log-action.ac_relay_OFF,.log-action.light_relay_OFF,.log-action.output_1_OFF,.log-action.relay_close_ON{color:#ff4545}

/* Wizard */
.wizard{display:none}
.wizard.show{display:block}
.wizard-card{background:var(--card);border:1px solid var(--line2);border-radius:var(--radius);padding:24px;margin-bottom:20px}
.wizard-title{font-size:16px;font-weight:800;margin-bottom:4px}
.wizard-sub{font-size:13px;color:var(--muted2);margin-bottom:18px}
.input-row{display:grid;grid-template-columns:1fr 1fr;gap:10px 20px;align-items:center;padding:10px 0;border-top:1px solid var(--line)}
.input-row:first-of-type{border-top:none}
.input-label{font-weight:700;font-size:13px}
.input-label .req{color:var(--bad);margin-left:3px}
.input-label .opt{color:var(--muted);font-size:11px;font-weight:600}
.input-type{font-size:10px;color:var(--muted);font-family:'Geist Mono',monospace}
.match-badge{font-size:10px;font-weight:700;padding:2px 7px;border-radius:999px;margin-left:6px;vertical-align:middle}
.match-badge.auto{background:rgba(34,217,122,.15);color:#22d97a;border:1px solid rgba(34,217,122,.3)}
.map-sel{padding:8px 10px;border-radius:var(--radius-sm);border:1px solid var(--line2);background:rgba(255,255,255,.04);color:var(--text);font-size:13px;font-weight:600;width:100%;outline:none;cursor:pointer}
.map-sel:focus{border-color:var(--blue)}
.map-sel.auto-matched{border-color:rgba(34,217,122,.4);background:rgba(34,217,122,.06)}
option{background:#0d1221;color:var(--text)}
.name-field{padding:10px 14px;border-radius:var(--radius-sm);border:1px solid var(--line2);background:rgba(255,255,255,.04);color:var(--text);font-size:14px;font-weight:600;outline:none;width:100%}
.name-field:focus{border-color:var(--blue)}

/* Thermostat mapping wizard */
.thermo-note{margin:0 0 14px;padding:12px 14px;border-radius:var(--radius-sm);border:1px solid rgba(29,140,255,.22);background:rgba(29,140,255,.08);font-size:12px;color:var(--muted2);line-height:1.55}
.thermo-note strong{color:var(--text)}
.wizard-group{margin-bottom:16px;border:1px solid var(--line);border-radius:var(--radius-sm);background:rgba(255,255,255,.025);overflow:hidden}
.wizard-group > summary{list-style:none;cursor:pointer;padding:12px 14px;display:flex;align-items:center;justify-content:space-between;gap:10px;font-weight:800;font-size:12px;letter-spacing:.04em;text-transform:uppercase;color:var(--text);background:rgba(255,255,255,.03)}
.wizard-group > summary::-webkit-details-marker{display:none}
.wizard-group > summary::after{content:"▶";font-size:10px;color:var(--muted);transition:transform .15s ease}
.wizard-group[open] > summary::after{transform:rotate(90deg)}
.wizard-group-body{padding:0 14px 14px}
.wizard-group-hint{font-size:11px;color:var(--muted2);margin:-2px 0 10px;line-height:1.45}
.zone-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:12px}
.zone-card{border:1px solid var(--line);border-radius:var(--radius-sm);background:rgba(255,255,255,.02);padding:12px}
.zone-card.active{border-color:rgba(29,140,255,.35);box-shadow:0 0 0 1px rgba(29,140,255,.12) inset}
.zone-toolbar{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;margin-bottom:10px}
.zone-toolbar-actions{display:flex;gap:8px;flex-wrap:wrap}
.zone-head{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:6px}
.zone-title{font-weight:800;font-size:13px}
.zone-meta{font-size:10px;font-family:'Geist Mono',monospace;color:var(--muted)}
.zone-badge{display:inline-flex;align-items:center;gap:4px;border-radius:999px;padding:2px 8px;font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.04em;border:1px solid var(--line2);color:var(--muted2);background:rgba(255,255,255,.04)}
.zone-badge.active{color:var(--blue);border-color:rgba(29,140,255,.35);background:rgba(29,140,255,.12)}
.zone-hint{font-size:11px;color:var(--muted2);line-height:1.45;margin-bottom:8px}
.input-row.compact{padding:8px 0}
@media(max-width:700px){.zone-grid{grid-template-columns:1fr}}


.thermo-summary{margin:0 0 14px;padding:12px 14px;border-radius:var(--radius-sm);border:1px solid rgba(255,201,71,.2);background:rgba(255,201,71,.05)}
.thermo-summary-head{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;margin-bottom:10px}
.thermo-summary-title{font-size:11px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:#ffd978}
.thermo-summary-sub{font-size:12px;color:var(--muted2)}
.thermo-sum-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:8px;margin-bottom:10px}
.thermo-stat{padding:9px 10px;border-radius:10px;border:1px solid var(--line);background:rgba(255,255,255,.03)}
.thermo-stat-k{font-size:10px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:3px}
.thermo-stat-v{font-size:15px;font-weight:900;color:var(--text)}
.thermo-zone-sum{display:flex;flex-wrap:wrap;gap:6px;margin:8px 0 0}
.thermo-zone-pill{display:inline-flex;align-items:center;gap:6px;padding:4px 9px;border-radius:999px;border:1px solid var(--line2);background:rgba(255,255,255,.04);font-size:11px;font-weight:700}
.thermo-zone-pill .mini{font-size:10px;color:var(--muted2);font-weight:600}
.thermo-issues{display:flex;flex-direction:column;gap:6px;margin-top:10px}
.thermo-issue{padding:8px 10px;border-radius:10px;font-size:12px;line-height:1.45;border:1px solid var(--line)}
.thermo-issue strong{font-weight:800}
.thermo-issue.sev-bad{border-color:rgba(255,69,69,.28);background:rgba(255,69,69,.07);color:#ffd3d3}
.thermo-issue.sev-warn{border-color:rgba(255,201,71,.28);background:rgba(255,201,71,.07);color:#ffe9a8}
.thermo-issue.sev-info{border-color:rgba(29,140,255,.28);background:rgba(29,140,255,.07);color:#beddff}

/* Custom Rule Builder */
.rule-card{background:rgba(168,85,247,.05);border:1px solid rgba(168,85,247,.2);border-radius:var(--radius-sm);padding:14px;margin-bottom:10px}
.rule-header{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.rule-name-input{flex:1;padding:6px 10px;border-radius:6px;border:1px solid var(--line2);background:rgba(255,255,255,.05);color:var(--text);font-size:13px;font-weight:700;outline:none}
.cond-row{display:grid;grid-template-columns:1fr 80px 80px;gap:8px;margin-bottom:6px;align-items:center}
.cond-sel,.cond-input{padding:6px 8px;border-radius:6px;border:1px solid var(--line2);background:rgba(255,255,255,.04);color:var(--text);font-size:12px;font-weight:600;outline:none;width:100%}
.cond-sel:focus,.cond-input:focus{border-color:var(--purple,#a855f7)}
.logic-toggle{display:flex;gap:6px;margin:8px 0}
.logic-btn{padding:4px 12px;border-radius:999px;border:1px solid var(--line2);background:rgba(255,255,255,.04);color:var(--muted2);font-size:11px;font-weight:700;cursor:pointer}
.logic-btn.active{background:rgba(168,85,247,.15);border-color:rgba(168,85,247,.4);color:#a855f7}
.action-row{display:grid;grid-template-columns:1fr 100px;gap:8px;margin-bottom:6px}

/* Buttons */
.btn{border:1px solid var(--line2);cursor:pointer;padding:9px 16px;border-radius:var(--radius-sm);font-weight:700;font-size:13px;font-family:'Outfit',sans-serif;background:rgba(255,255,255,.05);color:var(--text);transition:all .15s}
.btn:hover{background:rgba(255,255,255,.09)}
.btn:active{transform:scale(.97)}
.btn-sm{padding:6px 11px;font-size:11px}
.btn-xs{padding:3px 8px;font-size:10px}
.btn-primary{background:linear-gradient(135deg,var(--blue2,#0ea5e9) 0%,var(--blue) 55%,var(--orange) 100%);border-color:transparent;color:#fff;box-shadow:0 4px 18px rgba(29,140,255,.22)}
.btn-primary:hover{filter:brightness(1.1)}
.btn-danger{border-color:rgba(255,69,69,.3);color:var(--bad);background:rgba(255,69,69,.07)}
.btn-danger:hover{background:rgba(255,69,69,.15)}
.btn-purple{border-color:rgba(168,85,247,.3);color:#a855f7;background:rgba(168,85,247,.07)}

.empty-state{text-align:center;padding:36px 20px;color:var(--muted)}
.empty-icon{font-size:36px;margin-bottom:10px}
.empty-text{font-size:14px;font-weight:600}

.toast-wrap{position:fixed;bottom:24px;right:24px;z-index:999;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.toast{padding:10px 16px;border-radius:var(--radius-sm);font-size:12px;font-weight:700;background:var(--card);border:1px solid var(--line2);box-shadow:var(--shadow-sm);animation:toastIn .2s ease;font-family:'Geist Mono',monospace}
.toast.ok{border-color:rgba(34,217,122,.35);color:#22d97a;background:rgba(34,217,122,.08)}
.toast.err{border-color:rgba(255,69,69,.35);color:var(--bad);background:rgba(255,69,69,.08)}
@keyframes toastIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
@media(max-width:640px){.def-grid{grid-template-columns:1fr 1fr}.input-row{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="page">
  <div class="hdr">
    <div class="hdr-left">
      <img class="logo-sm" src="/logo.png" alt="ELARIS">
      <div>
        <div class="hdr-title"><span>ELARIS</span> Modules</div>
        <div class="hdr-sub">Smart automation for every system</div>
      </div>
    </div>
    <div class="actions">
      <a href="/help.html" class="btn">Help</a>
      <button class="btn" id="themeBtn" onclick="toggleTheme()">🌙</button>
      <a href="/" class="btn">← Dashboard</a>
    </div>
  </div>

  <!-- Active instances -->
  <div class="section-title">Active Modules <span id="instCount" style="color:var(--muted);font-weight:600"></span></div>
  <div id="instGrid" class="inst-grid" style="margin-bottom:32px">
    <div class="empty-state"><div class="empty-icon">📦</div><div class="empty-text">No modules added yet.</div></div>
  </div>

  <!-- Add module -->
  <div class="section-title">Add Module</div>

  <!-- Category filter tabs -->
  <div class="cat-tabs" id="catTabs"></div>

  <!-- Module cards -->
  <div class="def-grid" id="defGrid"></div>

  <!-- Wizard -->
  <div class="wizard" id="wizard">
    <div class="wizard-card">
      <div id="wizardTitle" class="wizard-title"></div>
      <div id="wizardSub"   class="wizard-sub"></div>

      <div style="margin-bottom:16px">
        <label class="section-title" style="display:block;margin-bottom:8px">Instance Name</label>
        <input class="name-field" id="wizardName" placeholder="e.g. Living Room AC">
      </div>

      <div class="section-title">Map Inputs</div>
      <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin:-4px 0 12px">
        <input class="sp-input" id="mapIOQueryInput" placeholder="Search IO (device / key / name / zone)" 
               style="flex:1;min-width:240px" oninput="mapIOQuery=this.value; renderWizardInputs(_lastMappings||{});">
        <select class="sp-input" id="mapZoneFilterSelect" style="width:220px"
                onchange="mapZoneFilter=this.value; renderWizardInputs(_lastMappings||{});">
          <option value="">All zones</option>
        </select>
        <button class="btn btn-sm" onclick="mapIOQuery=''; mapZoneFilter=''; document.getElementById('mapIOQueryInput').value=''; document.getElementById('mapZoneFilterSelect').value=''; renderWizardInputs(_lastMappings||{});">Clear</button>
      </div>
      <div id="wizardInputs"></div>

      <div style="display:flex;gap:10px;margin-top:18px;justify-content:flex-end">
        <button class="btn" onclick="cancelWizard()">Cancel</button>
        <button class="btn btn-primary" id="wizardSaveBtn" onclick="saveModule()">💾 Save Module</button>
      </div>
    </div>
  </div>
</div>

<div class="toast-wrap" id="toastWrap"></div>

<script src="/site-context.js?v=1"></script>
<script src="/role-ui.js?v=2"></script>
<script src="/modules.shared.js?v=1"></script>
<script>
// ── State ─────────────────────────────────────────────────────────────────
let defs = [], instances = [], siteIO = [], siteId = null, selectedDef = null, suggestions = {};
let mapIOQuery = "", mapZoneFilter = "";
let ruleIOQuery = "", ruleZoneFilter = "";
let activeCat = "all", editingId = null;
let ruleTestValues = {}, ruleTestClock = "", ruleTestWeekday = "", ruleLiveValues = {}, ruleLastTestContext = null;
let thermostatVisibleZones = 1;

// ── Shared helpers moved to /public/modules.shared.js ─────────────────────
function moduleSettingsEndpoint(instOrId) {
  const id = typeof instOrId === "object" ? instOrId?.id : instOrId;
  return `/api/automation/settings/${id}`;
}

function moduleLogEndpoint(instOrId) {
  const id = typeof instOrId === "object" ? instOrId?.id : instOrId;
  return `/api/automation/log/${id}`;
}

function getMapDisplayValue(map) {
  return map?.io_name || (map?.io_key ? `${map.group_name}.${map.io_key}` : null);
}

function escapeHtml(str) {
  return String(str ?? '').replace(/[&<>"']/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]));
}

function renderMapItem(label, value, key, opts={}) {
  const rich = !!opts.rich;
  const cls = `map-val ${value?"":"unmapped"}${rich?" rich":""}`;
  return `<div class="map-item">
    <span class="map-key">${label || key}</span>
    <span class="${cls}">${value||"— not set —"}</span>
  </div>`;
}

function renderCompactBadge(label, value, extraClass = "") {
  return `<span class="compact-badge ${extraClass}"><span class="k">${escapeHtml(label)}</span><span class="v">${escapeHtml(value)}</span></span>`;
}

function stateOn(v) {
  return v === true || v === 1 || v === "1" || String(v || "").toUpperCase() === "ON" || String(v || "").toUpperCase() === "TRUE";
}

function renderInstanceMapRows(inst, def, maps) {
  if (inst?.module_id === 'thermostat' && def) {
    const byKey = (key) => maps.find(x => x.input_key === key);
    const compactValue = (key) => getMapDisplayValue(byKey(key));
    const compactParts = [];
    const zoneSummaries = [];
    const liveValues = inst?._liveStatus?.values || {};

    const centralVal = compactValue('central_pump');
    if (centralVal) {
      const centralLive = stateOn(liveValues.central_pump);
      const centralDisplay = renderCompactBadge('map', centralVal) + renderCompactBadge('live', centralLive ? 'ON' : 'OFF', centralLive ? 'live-on' : 'live-off');
      compactParts.push(renderMapItem('Central Pump', centralDisplay, 'central_pump', { rich:true }));
    }

    const legacyKeys = ['temp_room','ac_relay','temp_outdoor'];
    const legacyPairs = legacyKeys.map(key => {
      const input = (def.inputs||[]).find(i => i.key === key);
      const val = compactValue(key);
      return val ? `${input?.short_label || input?.label || key}: ${val}` : null;
    }).filter(Boolean);

    let activeZoneCount = 0;
    for (let i = 1; i <= 6; i++) {
      const tempVal = compactValue(`zone_${i}_temp`);
      const callVal = compactValue(`zone_${i}_call`);
      const outVal  = compactValue(`zone_${i}_output`);
      const pumpVal = compactValue(`zone_${i}_pump`);
      const pieces = [];
      if (tempVal) pieces.push(renderCompactBadge('temp', tempVal));
      if (callVal) pieces.push(renderCompactBadge('call', callVal));
      if (outVal) pieces.push(renderCompactBadge('out', outVal));
      if (pumpVal) pieces.push(renderCompactBadge('pump', pumpVal));
      if (pieces.length) {
        activeZoneCount += 1;
        zoneSummaries.push(renderMapItem(`Zone ${i}`, pieces.join(''), `zone_${i}`, { rich:true }));
      }
    }

    if (activeZoneCount) {
      compactParts.unshift(renderMapItem('Configured Zones', String(activeZoneCount), 'zones_count'));
    }

    const fullSections = [];
    if (centralVal) {
      const centralLive = stateOn(liveValues.central_pump);
      const centralFull = renderCompactBadge('map', centralVal) + renderCompactBadge('live', centralLive ? 'ON' : 'OFF', centralLive ? 'live-on' : 'live-off');
      fullSections.push(`<div class="sp-title" style="margin-bottom:6px">Shared</div>${renderMapItem('Central Pump', centralFull, 'central_pump', { rich:true })}`);
    }
    if (legacyPairs.length) {
      const legacyRows = legacyKeys.map(key => {
        const input = (def.inputs||[]).find(i => i.key === key);
        const val = compactValue(key);
        if (!val) return '';
        return renderMapItem(input?.label || key, val, key);
      }).filter(Boolean).join('');
      fullSections.push(`<div class="sp-title" style="margin:10px 0 6px">Legacy / Single Zone</div>${legacyRows}`);
    }
    if (zoneSummaries.length) {
      const zoneGroups = [];
      for (let i = 1; i <= 6; i++) {
        const zoneKeys = [`zone_${i}_temp`,`zone_${i}_call`,`zone_${i}_output`,`zone_${i}_pump`];
        const rows = zoneKeys.map(key => {
          const input = (def.inputs||[]).find(inp => inp.key === key);
          const val = compactValue(key);
          if (!val) return '';
          return renderMapItem(input?.label || key, val, key);
        }).filter(Boolean).join('');
        if (rows) zoneGroups.push(`<div class="sp-title" style="margin:10px 0 6px">Zone ${i}</div>${rows}`);
      }
      fullSections.push(zoneGroups.join(''));
    }

    const summaryHtml = [
      ...compactParts,
      ...zoneSummaries,
      ...(legacyPairs.length && !activeZoneCount ? [renderMapItem('Legacy', legacyPairs.join(' • '), 'legacy')] : [])
    ].join('');

    if (summaryHtml) {
      const detailsHtml = fullSections.length ? `
        <details class="thermo-compact-details" style="margin-top:8px">
          <summary style="cursor:pointer;color:var(--muted);font-size:11px;letter-spacing:.08em;text-transform:uppercase">Show full mappings</summary>
          <div style="margin-top:8px">${fullSections.join('')}</div>
        </details>` : '';
      return `${summaryHtml}${detailsHtml}`;
    }
  }

  // Fallback / generic rendering
  const mapInputs = (def?.dynamic && maps.length)
    ? maps.map(m => ({ key: m.input_key }))
    : (def?.inputs||[]);
  return mapInputs.map(input => {
    const m   = maps.find(x => x.input_key===input.key);
    const val = getMapDisplayValue(m);
    return renderMapItem(input.label || input.key, val, input.key);
  }).join("");
}

function thermostatZoneKeys(zoneNo) {
  return [`zone_${zoneNo}_temp`,`zone_${zoneNo}_call`,`zone_${zoneNo}_output`,`zone_${zoneNo}_pump`];
}

function thermostatZoneDefs(zoneNo) {
  const keys = thermostatZoneKeys(zoneNo);
  return keys.map(key => (selectedDef?.inputs||[]).find(inp => inp.key === key)).filter(Boolean);
}

function thermostatZoneState(zoneNo, currentMappings={}) {
  const defs = thermostatZoneDefs(zoneNo);
  const mapped = defs.filter(inp => !!(currentMappings[inp.key] || suggestions[inp.key]));
  const active = zoneNo === 1 || mapped.length > 0;
  return { defs, active, mappedCount: mapped.length };
}

function thermostatSuggestedVisibleZones(currentMappings={}) {
  let highest = 1;
  for (let i = 1; i <= 6; i++) {
    const { mappedCount } = thermostatZoneState(i, currentMappings);
    if (mappedCount > 0) highest = i;
  }
  return Math.max(1, Math.min(6, highest));
}

function setThermostatVisibleZones(nextCount) {
  thermostatVisibleZones = Math.max(1, Math.min(6, Number(nextCount) || 1));
  const wizard = document.getElementById("wizard");
  if (wizard && wizard.classList.contains("show") && selectedDef?.id === 'thermostat') {
    const currentMappings = {};
    (selectedDef?.inputs || []).forEach((input) => {
      const sel = document.getElementById("map_" + input.key);
      if (sel?.value) currentMappings[input.key] = Number(sel.value);
    });
    renderWizardInputs(currentMappings);
  }
}

function ioLabelById(ioId) {
  const io = siteIO.find(x => Number(x.id) === Number(ioId));
  if (!io) return `IO ${ioId}`;
  return `${io.device_id}·${io.group_name}.${io.key}` + (io.name && io.name !== io.key ? ` (${io.name})` : '');
}

function collectCurrentWizardMappings() {
  const mappings = {};
  (selectedDef?.inputs || []).forEach(input => {
    const sel = document.getElementById('map_' + input.key);
    if (sel?.value) mappings[input.key] = Number(sel.value);
  });
  if (selectedDef?.dynamic) {
    dynSlots.forEach(slot => {
      const sel = document.getElementById('map_' + slot.key);
      if (sel?.value) mappings[slot.key] = Number(sel.value);
    });
  }
  return mappings;
}

function analyzeThermostatMappings(currentMappings={}) {
  const centralPump = Number(currentMappings.central_pump || 0) || null;
  const legacy = {
    temp_room: Number(currentMappings.temp_room || 0) || null,
    ac_relay: Number(currentMappings.ac_relay || 0) || null,
    temp_outdoor: Number(currentMappings.temp_outdoor || 0) || null,
  };
  const zones = [];
  const issues = [];
  const actuatorUsage = new Map();

  const noteActuator = (ioId, label) => {
    if (!ioId) return;
    if (!actuatorUsage.has(ioId)) actuatorUsage.set(ioId, []);
    actuatorUsage.get(ioId).push(label);
  };

  noteActuator(centralPump, 'Central pump');
  noteActuator(legacy.ac_relay, 'Legacy output');

  for (let i = 1; i <= 6; i++) {
    const zone = {
      n: i,
      temp: Number(currentMappings[`zone_${i}_temp`] || 0) || null,
      call: Number(currentMappings[`zone_${i}_call`] || 0) || null,
      output: Number(currentMappings[`zone_${i}_output`] || 0) || null,
      pump: Number(currentMappings[`zone_${i}_pump`] || 0) || null,
    };
    zone.configured = !!(zone.temp || zone.call || zone.output || zone.pump);
    zone.hasDemandSource = !!(zone.temp || zone.call);
    zone.hasActuator = !!(zone.output || zone.pump || centralPump);
    if (zone.configured) zones.push(zone);
    noteActuator(zone.output, `Zone ${i} output`);
    noteActuator(zone.pump, `Zone ${i} pump`);

    if (!zone.configured) continue;
    if (zone.call && zone.temp) {
      issues.push({ severity:'info', message:`Zone ${i} has both thermostat call and temperature. <strong>Thermostat call wins</strong>; the temperature stays as fallback/display.` });
    }
    if (zone.hasDemandSource && !zone.hasActuator) {
      issues.push({ severity:'bad', message:`Zone ${i} has a demand source but no output/pump and no central pump mapped.` });
    }
    if (!zone.hasDemandSource && (zone.output || zone.pump)) {
      issues.push({ severity:'warn', message:`Zone ${i} has actuator mappings but no temperature or thermostat call input.` });
    }
    if (!zone.output && !zone.pump && centralPump && zone.hasDemandSource) {
      issues.push({ severity:'info', message:`Zone ${i} relies only on the central pump. That is fine if actuation happens elsewhere.` });
    }
  }

  for (const [ioId, labels] of actuatorUsage.entries()) {
    if (labels.length > 1) {
      issues.push({ severity:'bad', message:`Same actuator mapped more than once: <strong>${ioLabelById(ioId)}</strong> used by ${labels.join(', ')}.` });
    }
  }

  if (!zones.length && !(legacy.temp_room || legacy.ac_relay)) {
    issues.push({ severity:'bad', message:'No thermostat zones configured yet. Map at least one zone input and one actuator.' });
  }

  if ((legacy.temp_room || legacy.ac_relay || legacy.temp_outdoor) && zones.length) {
    issues.push({ severity:'warn', message:'Legacy single-zone mappings are present together with zoned mappings. Keep Legacy only for older one-zone compatibility.' });
  }

  if ((legacy.temp_room || legacy.ac_relay) && !(legacy.temp_room && (legacy.ac_relay || centralPump))) {
    issues.push({ severity:'warn', message:'Legacy mapping is incomplete. A classic single-zone setup normally needs a room temperature and an output (or central pump).' });
  }

  const configuredZones = zones.length;
  const zonesWithCall = zones.filter(z => z.call).length;
  const zonesWithTemp = zones.filter(z => z.temp).length;
  const zonesWithOutput = zones.filter(z => z.output).length;
  const zonesWithPump = zones.filter(z => z.pump).length;
  const readiness = issues.some(i => i.severity === 'bad') ? 'Needs fixes' : (issues.some(i => i.severity === 'warn') ? 'Check warnings' : 'Ready to save');

  return { centralPump, legacy, zones, issues, configuredZones, zonesWithCall, zonesWithTemp, zonesWithOutput, zonesWithPump, readiness };
}

function renderThermostatCommissioningSummary(currentMappings={}) {
  const a = analyzeThermostatMappings(currentMappings);
  const zonePills = a.zones.map(z => {
    const parts = [];
    if (z.call) parts.push('CALL');

    return `<span class="thermo-zone-pill"><strong>Z${z.n}</strong><span class="mini">${parts.join(' • ') || 'EMPTY'}</span></span>`;
  }).join('') || `<span class="thermo-zone-pill"><strong>No zones yet</strong><span class="mini">Map Zone 1 to start</span></span>`;
  const issues = a.issues.length
    ? `<div class="thermo-issues">${a.issues.map(i => `<div class="thermo-issue sev-${i.severity}"><strong>${i.severity === 'bad' ? 'Fix' : i.severity === 'warn' ? 'Check' : 'Info'}:</strong> ${i.message}</div>`).join('')}</div>`
    : `<div class="thermo-issues"><div class="thermo-issue sev-info"><strong>Ready:</strong> This thermostat setup looks clean so far.</div></div>`;
  const legacyMode = (a.legacy.temp_room || a.legacy.ac_relay || a.legacy.temp_outdoor) ? 'Legacy mapped' : 'Unused';
  return `
    <div class="thermo-summary">
      <div class="thermo-summary-head">
        <div>
          <div class="thermo-summary-title">Commissioning summary</div>
          <div class="thermo-summary-sub">Quick check before you save this thermostat mapping.</div>
        </div>
        <div class="compact-badge ${a.issues.some(i => i.severity === 'bad') ? 'live-off' : 'live-on'}"><span class="k">Status</span><span class="v">${a.readiness}</span></div>
      </div>
      <div class="thermo-sum-grid">
        <div class="thermo-stat"><div class="thermo-stat-k">Configured zones</div><div class="thermo-stat-v">${a.configuredZones}</div></div>
        <div class="thermo-stat"><div class="thermo-stat-k">Zones with call</div><div class="thermo-stat-v">${a.zonesWithCall}</div></div>
        <div class="thermo-stat"><div class="thermo-stat-k">Zones with temp</div><div class="thermo-stat-v">${a.zonesWithTemp}</div></div>
        <div class="thermo-stat"><div class="thermo-stat-k">Zone outputs</div><div class="thermo-stat-v">${a.zonesWithOutput}</div></div>
        <div class="thermo-stat"><div class="thermo-stat-k">Zone pumps</div><div class="thermo-stat-v">${a.zonesWithPump}</div></div>
        <div class="thermo-stat"><div class="thermo-stat-k">Central pump</div><div class="thermo-stat-v">${a.centralPump ? ioLabelById(a.centralPump) : 'Not mapped'}</div></div>
        <div class="thermo-stat"><div class="thermo-stat-k">Legacy</div><div class="thermo-stat-v">${legacyMode}</div></div>
      </div>
      <div class="thermo-zone-sum">${zonePills}</div>
      ${issues}
    </div>`;
}

function analyzeLightingMappings(currentMappings={}) {
  const map = key => Number(currentMappings[key] || 0) || null;
  const relay = map('light_relay');
  const dimmer = map('dimmer_output');
  const switchDi = map('switch_di');
  const pir = map('pir_sensor');
  const motionAi = map('motion_ai');
  const lux = map('lux_sensor');
  const issues = [];
  const ioUse = new Map();
  const note = (id, label) => {
    if (!id) return;
    if (!ioUse.has(id)) ioUse.set(id, []);
    ioUse.get(id).push(label);
  };
  [
    [relay, 'Relay output'],
    [dimmer, 'Dimmer output'],
    [switchDi, 'Wall switch'],
    [pir, 'PIR'],
    [motionAi, 'Presence AI'],
    [lux, 'Lux sensor'],
  ].forEach(([id,label]) => note(id,label));

  const outputs = [];
  if (relay) outputs.push({ key:'light_relay', label:'Relay output', io:relay });
  if (dimmer) outputs.push({ key:'dimmer_output', label:'Dimmer output', io:dimmer });
  const inputs = [];
  if (switchDi) inputs.push({ key:'switch_di', label:'Wall switch', io:switchDi });
  if (pir) inputs.push({ key:'pir_sensor', label:'PIR', io:pir });
  if (motionAi) inputs.push({ key:'motion_ai', label:'Presence AI', io:motionAi });
  if (lux) inputs.push({ key:'lux_sensor', label:'Lux sensor', io:lux });

  if (!outputs.length) issues.push({ severity:'bad', message:'Map at least one output (relay or dimmer).' });
  if (!inputs.length) issues.push({ severity:'info', message:'No control inputs mapped yet. The module can still work from manual dashboard control or fixed schedule.' });

  [...ioUse.entries()].forEach(([ioId, labels]) => {
    if (labels.length > 1) issues.push({ severity:'warn', message:`The same IO is reused for ${labels.join(', ')}.` });
  });

  const readiness = issues.some(i=>i.severity==='bad') ? 'Needs outputs' : (issues.some(i=>i.severity==='warn') ? 'Check mappings' : 'Ready');
  return {
    relay, dimmer, switchDi, pir, motionAi, lux,
    outputs, inputs, issues, readiness
  };
}

function analyzeSolarMappings(currentMappings={}) {
  const map = key => Number(currentMappings[key] || 0) || null;
  const sensorSolar = map('temp_solar');
  const sensorBoiler = map('temp_boiler');
  const pump = map('pump');
  const pumpSpeed = map('pump_speed');
  const heater = map('heater');
  const backup = map('backup');
  const issues = [];
  const ioUse = new Map();
  const note = (id, label) => {
    if (!id) return;
    if (!ioUse.has(id)) ioUse.set(id, []);
    ioUse.get(id).push(label);
  };
  [[sensorSolar,'Collector sensor'],[sensorBoiler,'Boiler sensor'],[pump,'Solar pump'],[pumpSpeed,'Pump speed'],[heater,'Heater'],[backup,'Backup heat']].forEach(([id,label])=>note(id,label));
  if (!sensorSolar) issues.push({ severity:'bad', message:'Collector temperature sensor is required.' });
  if (!sensorBoiler) issues.push({ severity:'bad', message:'Boiler temperature sensor is required.' });
  if (!pump) issues.push({ severity:'bad', message:'Solar pump output is required.' });
  if (sensorSolar && sensorBoiler && sensorSolar === sensorBoiler) issues.push({ severity:'bad', message:'Collector and boiler temperatures use the same IO. Differential control needs two distinct sensors.' });
  if (pumpSpeed && !pump) issues.push({ severity:'warn', message:'Pump speed is mapped without a main pump output.' });
  if (pumpSpeed) {
    const io = siteIO.find(x => Number(x.id) === Number(pumpSpeed));
    if (io && !['dimmer','ao','analog','pwm'].includes(String(io.type||'').toLowerCase())) issues.push({ severity:'warn', message:'Pump speed should normally be an analog/dimmer output.' });
  }
  if (heater && backup && heater === backup) issues.push({ severity:'bad', message:'Heater and backup heat source use the same actuator.' });
  [...ioUse.entries()].forEach(([ioId, labels]) => {
    if (labels.length > 1) issues.push({ severity:'warn', message:`The same IO is reused for ${labels.join(', ')}.` });
  });
  const outputs = [pump, pumpSpeed, heater, backup].filter(Boolean).length;
  const inputs = [sensorSolar, sensorBoiler].filter(Boolean).length;
  const readiness = issues.some(i=>i.severity==='bad') ? 'Needs fixes' : (issues.some(i=>i.severity==='warn') ? 'Check mappings' : 'Ready');
  return { sensorSolar, sensorBoiler, pump, pumpSpeed, heater, backup, outputs, inputs, issues, readiness };
}

function renderSolarCommissioningSummary(currentMappings={}) {
  const a = analyzeSolarMappings(currentMappings);
  const outputPills = [

    a.pumpSpeed ? `<span class="thermo-zone-pill"><strong>Pump Speed</strong><span class="mini">${ioLabelById(a.pumpSpeed)}</span></span>` : '',
    a.heater ? `<span class="thermo-zone-pill"><strong>Heater</strong><span class="mini">${ioLabelById(a.heater)}</span></span>` : '',
    a.backup ? `<span class="thermo-zone-pill"><strong>Backup</strong><span class="mini">${ioLabelById(a.backup)}</span></span>` : ''
  ].filter(Boolean).join('') || `<span class="thermo-zone-pill"><strong>No outputs</strong><span class="mini">Pump is required. Heater and backup are optional.</span></span>`;

function analyzeEnergyMappings(currentMappings={}) {
  const map = key => Number(currentMappings[key] || 0) || null;
  const power = map('power_w');
  const relay = map('relay');
  const tariff = Number(document.getElementById('sp_new_tariff')?.value || document.getElementById('sp_0_tariff')?.value || 0.20);
  const resetHour = Number(document.getElementById('sp_new_reset_hour')?.value || document.getElementById('sp_0_reset_hour')?.value || 0);
  const alertAbove = Number(document.getElementById('sp_new_alert_above_w')?.value || document.getElementById('sp_0_alert_above_w')?.value || 0);
  const issues = [];
  if (!power) issues.push({ severity:'bad', message:'Map a power meter (W) input.' });
  if (power && relay && power === relay) issues.push({ severity:'bad', message:'Power meter and controlled relay use the same IO.' });
  if (!relay) issues.push({ severity:'info', message:'Controlled relay is optional. Map it only if you want an energy-linked load output.' });
  if (!Number.isFinite(tariff) || tariff < 0) issues.push({ severity:'warn', message:'Tariff should be a positive number.' });
  if (!Number.isFinite(resetHour) || resetHour < 0 || resetHour > 23) issues.push({ severity:'bad', message:'Daily reset hour must be between 0 and 23.' });
  if (Number.isFinite(alertAbove) && alertAbove < 0) issues.push({ severity:'warn', message:'Alert threshold should be 0 or higher.' });
  const readiness = issues.some(i=>i.severity==='bad') ? 'Needs fixes' : (issues.some(i=>i.severity==='warn') ? 'Check settings' : 'Ready');
  return { power, relay, tariff, resetHour, alertAbove, issues, readiness };
}

function analyzeIrrigationMappings(currentMappings={}) {
  const ioUse = new Map();
  const issues = [];
  const note = (id, label) => {
    if (!id) return;
    if (!ioUse.has(id)) ioUse.set(id, []);
    ioUse.get(id).push(label);
  };

  const zoneRows = [1,2,3].map(i => ({
    idx:i,
    zone: Number(currentMappings['zone_'+i]||0)||null,
    minutes: Number(currentMappings['zone_'+i+'_min']||0)||0
  }));
  const master = Number(currentMappings['master_valve']||0)||null;
  const rain = Number(currentMappings['rain_sensor']||0)||null;
  const soil = Number(currentMappings['soil_moisture']||0)||null;
  const temp = Number(currentMappings['temp_outdoor']||0)||null;
  const wind = Number(currentMappings['wind_sensor']||0)||null;
  const lux = Number(currentMappings['lux_sensor']||0)||null;
  const flow = Number(currentMappings['flow_sensor']||0)||null;

  zoneRows.forEach(z => note(z.zone, `Zone ${z.idx}`));
  [[master,'Master valve'],[rain,'Rain sensor'],[soil,'Soil moisture'],[temp,'Outdoor temp'],[wind,'Wind sensor'],[lux,'Lux'],[flow,'Flow sensor']].forEach(([id,label])=>note(id,label));

  const configuredZones = zoneRows.filter(z => z.zone);
  if (!configuredZones.length) issues.push({severity:'bad', message:'Map at least one irrigation zone valve/relay.'});
  if (configuredZones.length && !configuredZones.some(z => z.idx===1 && z.zone)) {
    issues.push({severity:'warn', message:'Zone 1 is not mapped. Sequential runs normally start from zone 1.'});
  }
  if (configuredZones.some(z => z.zone) && configuredZones.every(z => !z.zone || z.minutes<=0)) {
    issues.push({severity:'warn', message:'All mapped zones have zero configured duration. Set zone minutes in setpoints after saving.'});
  }
  if (master && configuredZones.some(z => z.zone===master)) issues.push({severity:'bad', message:'Master valve reuses the same output as a zone valve.'});
  if (flow && !configuredZones.length) issues.push({severity:'info', message:'Flow meter is mapped but no zones are configured yet.'});
  if (lux && !temp) issues.push({severity:'info', message:'Lux sensor helps ET estimation only when outdoor temperature is also mapped.'});
  if (soil && !rain) issues.push({severity:'info', message:'Only soil moisture is mapped. Consider adding rain sensor for better skip logic.'});
  [...ioUse.entries()].forEach(([ioId, labels]) => {
    if (labels.length > 1) issues.push({severity:'warn', message:`The same IO is reused for ${labels.join(', ')}.`});
  });

  const readiness = issues.some(i=>i.severity==='bad') ? 'Needs fixes' : (issues.some(i=>i.severity==='warn') ? 'Check mappings' : 'Ready');
  return {zoneRows, configuredZones, master, rain, soil, temp, wind, lux, flow, issues, readiness};
}

function analyzeHydronicMappings(currentMappings={}) {
  const map = key => Number(currentMappings[key] || 0) || null;
  const issues = [];
  const ioUse = new Map();
  const note = (id, label) => {
    if (!id) return;
    if (!ioUse.has(id)) ioUse.set(id, []);
    ioUse.get(id).push(label);
  };

  const topology = map('mixing_valve') ? 'mixing' : 'direct';
  const source1 = map('heat_source_1');
  const source2 = map('heat_source_2');
  const valve = map('mixing_valve');
  const supply = map('temp_supply');
  const buffer = map('temp_buffer');
  const mainPump = map('main_pump');
  const flow = map('flow_switch');
  const outdoor = map('temp_outdoor');
  const collector = map('temp_collector');
  const solarPump = map('solar_pump');
  const roomRh = map('humidity_room');
  const supplyRh = map('humidity_supply');
  const resistance = map('resistance');

  const zones = [];
  for (let i = 1; i <= 6; i++) {
    const thermostat = map(`zone_${i}_thermostat`);
    const pump = map(`zone_${i}_pump`);
    const configured = !!(thermostat || pump);
    if (!configured) continue;
    zones.push({ idx:i, thermostat, pump, complete: !!(thermostat && pump) });
    note(thermostat, `Zone ${i} thermostat`);
    note(pump, `Zone ${i} pump`);
  }

  [[source1,'Heat Source 1'],[source2,'Heat Source 2'],[valve,'Mixing valve'],[supply,'Supply temp'],[buffer,'Buffer temp'],[mainPump,'Main pump'],[flow,'Flow switch'],[outdoor,'Outdoor temp'],[collector,'Collector temp'],[solarPump,'Solar pump'],[roomRh,'Room RH'],[supplyRh,'Supply RH'],[resistance,'Resistance']].forEach(([id,label])=>note(id,label));

  if (!source1) issues.push({severity:'bad', message:'Map Heat Source 1 output.'});
  if (!map('zone_1_thermostat')) issues.push({severity:'bad', message:'Map Zone 1 thermostat input.'});
  if (!map('zone_1_pump')) issues.push({severity:'bad', message:'Map Zone 1 pump output.'});
  if (!zones.length) issues.push({severity:'bad', message:'Map at least one thermostat + pump zone pair.'});
  zones.filter(z => !z.complete).forEach(z => issues.push({severity:'warn', message:`Zone ${z.idx} is incomplete. Map both thermostat and pump.`}));
  if (topology === 'mixing' && !valve) issues.push({severity:'bad', message:'Mixing topology needs an analog mixing valve output.'});
  if (topology === 'mixing' && !supply) issues.push({severity:'bad', message:'Mixing topology needs a supply temperature sensor.'});
  if (topology === 'direct' && !buffer) issues.push({severity:'info', message:'Direct topology can work without buffer sensor; source will follow zone demand directly.'});
  if (!buffer) issues.push({severity:'info', message:'Buffer temperature is optional but recommended for source staging.'});
  if (source2 && !map('heat_source_2')) issues.push({severity:'warn', message:'Fallback source 2 is selected but not mapped.'});
  if (collector && !solarPump) issues.push({severity:'info', message:'Solar collector sensor is mapped without a solar pump output.'});
  if (solarPump && !collector) issues.push({severity:'info', message:'Solar pump is mapped without collector temperature.'});
  if (roomRh && !supply) issues.push({severity:'info', message:'Room humidity is mapped, but supply temperature is missing for dew-point protection.'});
  if (supplyRh && !roomRh) issues.push({severity:'info', message:'Supply humidity is mapped without room humidity.'});
  if (!outdoor) issues.push({severity:'info', message:'Outdoor temperature is optional but recommended for weather compensation.'});
  [...ioUse.entries()].forEach(([ioId, labels]) => {
    if (labels.length > 1) issues.push({severity:'warn', message:`The same IO is reused for ${labels.join(', ')}.`});
  });

  const readiness = issues.some(i=>i.severity==='bad') ? 'Needs fixes' : (issues.some(i=>i.severity==='warn') ? 'Check mappings' : 'Ready');
  return { topology, source1, source2, valve, supply, buffer, mainPump, flow, outdoor, collector, solarPump, roomRh, supplyRh, resistance, zones, issues, readiness };
}

function analyzePoolSpaMappings(currentMappings={}) {
  const map = key => Number(currentMappings[key] || 0) || null;
  const issues = [];
  const ioUse = new Map();
  const note = (id, label) => { if (!id) return; if (!ioUse.has(id)) ioUse.set(id, []); ioUse.get(id).push(label); };

  const core = {
    filterPump: map('filter_pump'),
    tempWater: map('temp_water'),
  };
  const heating = {
    solarPump: map('solar_pump'),
    collector: map('temp_collector'),
    buffer: map('temp_buffer'),
    source1: map('heat_source_1'),
    source2: map('heat_source_2'),
    hp1Fault: map('hp_1_fault'),
    hp2Fault: map('hp_2_fault'),
    defrost: map('hp_defrost'),
  };
  const safety = {
    flow: map('flow_switch'),
    pressure: map('pressure_sensor'),
    level: map('level_sensor'),
    backwash: map('backwash_valve'),
    outdoor: map('temp_outdoor'),
  };
  const chemistry = {
    ph: map('ph_sensor'),
    orp: map('orp_sensor'),
    phMinus: map('ph_minus_pump'),
    phPlus: map('ph_plus_pump'),
    cl: map('cl_pump'),
  };
  const extras = {
    spaJets: map('spa_jets'),
    lights: map('lights'),
    lux: map('lux_sensor'),
  };

  Object.entries({
    'Filter pump': core.filterPump,
    'Water temp': core.tempWater,
    'Solar pump': heating.solarPump,
    'Collector temp': heating.collector,
    'Buffer temp': heating.buffer,
    'Heat source 1': heating.source1,
    'Heat source 2': heating.source2,
    'HP1 fault': heating.hp1Fault,
    'HP2 fault': heating.hp2Fault,
    'Defrost': heating.defrost,
    'Flow switch': safety.flow,
    'Pressure sensor': safety.pressure,
    'Level sensor': safety.level,
    'Backwash valve': safety.backwash,
    'Outdoor temp': safety.outdoor,
    'pH sensor': chemistry.ph,
    'ORP sensor': chemistry.orp,
    'pH- pump': chemistry.phMinus,
    'pH+ pump': chemistry.phPlus,
    'Cl pump': chemistry.cl,
    'Spa jets': extras.spaJets,
    'Lights': extras.lights,
    'Lux sensor': extras.lux,
  }).forEach(([label, id]) => note(id, label));

  if (!core.filterPump) issues.push({ severity:'bad', message:'Map the filter pump relay.' });
  if (!core.tempWater) issues.push({ severity:'bad', message:'Map the pool water temperature sensor.' });
  if (heating.source2 && !heating.source1) issues.push({ severity:'bad', message:'Heat Source 2 is mapped, but Heat Source 1 is missing. Source 2 is fallback-only in this module.' });
  if (heating.solarPump && !heating.collector) issues.push({ severity:'warn', message:'Solar pump is mapped without collector temperature. Solar heating cannot calculate ΔT.' });
  if (heating.collector && !heating.solarPump) issues.push({ severity:'warn', message:'Collector temperature is mapped without solar pump output.' });
  if (heating.buffer && !heating.solarPump) issues.push({ severity:'info', message:'Buffer temperature is mapped, but solar pump is missing. Thermal dump will not run.' });
  if ((heating.source1 || heating.source2 || heating.solarPump) && !safety.flow) issues.push({ severity:'info', message:'Add a flow switch for safer heater / solar shutdown verification.' });
  if (safety.backwash && !safety.pressure) issues.push({ severity:'info', message:'Backwash valve is mapped without pressure sensor. Backwash stays manual-confirm only.' });
  if (safety.pressure && !safety.backwash) issues.push({ severity:'info', message:'Pressure sensor is mapped without backwash valve. You will get alerts only.' });
  if (safety.backwash && !safety.level) issues.push({ severity:'info', message:'Add a level sensor so backwash can block on low water level.' });
  if (heating.hp1Fault && !heating.source1) issues.push({ severity:'warn', message:'HP1 fault input is mapped without Heat Source 1.' });
  if (heating.hp2Fault && !heating.source2) issues.push({ severity:'warn', message:'HP2 fault input is mapped without Heat Source 2.' });
  if (chemistry.phMinus && !chemistry.ph) issues.push({ severity:'warn', message:'pH- dosing pump is mapped without a pH sensor.' });
  if (chemistry.phPlus && !chemistry.ph) issues.push({ severity:'warn', message:'pH+ dosing pump is mapped without a pH sensor.' });
  if (chemistry.cl && !chemistry.orp) issues.push({ severity:'warn', message:'Chlorine dosing pump is mapped without an ORP sensor.' });
  if (chemistry.orp && !chemistry.ph) issues.push({ severity:'info', message:'ORP alert works best with pH sensor mapped, because chlorine advice is pH-first.' });
  if ((chemistry.ph || chemistry.orp) && !(chemistry.phMinus || chemistry.phPlus || chemistry.cl)) issues.push({ severity:'info', message:'Chemistry sensors are mapped, but no dosing pumps are configured. Alerts-only mode is fine.' });
  if (extras.lux && !extras.lights) issues.push({ severity:'info', message:'Lux sensor is mapped without pool lights output.' });
  [...ioUse.entries()].forEach(([ioId, labels]) => {
    if (labels.length > 1) issues.push({ severity:'warn', message:`The same IO is reused for ${labels.join(', ')}.` });
  });

  const readiness = issues.some(i=>i.severity==='bad') ? 'Needs fixes' : (issues.some(i=>i.severity==='warn') ? 'Check mappings' : 'Ready');
  return {
    core, heating, safety, chemistry, extras, issues, readiness,
    solarReady: !!(heating.solarPump && heating.collector),
    heatingReady: !!heating.source1,
    chemistryCount: [chemistry.ph, chemistry.orp, chemistry.phMinus, chemistry.phPlus, chemistry.cl].filter(Boolean).length,
    safetyCount: [safety.flow, safety.pressure, safety.level, safety.backwash, safety.outdoor].filter(Boolean).length,
    extrasCount: [extras.spaJets, extras.lights, extras.lux].filter(Boolean).length,
  };
}

function renderPoolSpaSummary(inst, settings, liveWrap) {
  const live = liveWrap?.state || liveWrap || {};

  const maps = inst.mappings || [];
  const mapped = key => maps.some(m => m.input_key === key && m.io_id);

  const target = live.target_pool_temp != null ? Number(live.target_pool_temp).toFixed(1) + '°C' : (settings.pool_temp_target != null ? Number(settings.pool_temp_target).toFixed(1) + '°C' : '—');
  const hours = live.filt_hours_today != null ? Number(live.filt_hours_today).toFixed(1) + 'h' : (settings._filt_hours_today ? Number(settings._filt_hours_today).toFixed(1) + 'h' : '—');
  const hoursTarget = live.filt_target_today != null ? Number(live.filt_target_today).toFixed(0) + 'h' : (settings._filt_target_today ? Number(settings._filt_target_today).toFixed(0) + 'h' : '—');
  const pressure = values.pressure_sensor != null ? Number(values.pressure_sensor).toFixed(2) + ' bar' : '—';
  const ph = values.ph_sensor != null ? Number(values.ph_sensor).toFixed(2) : '—';
  const orp = values.orp_sensor != null ? Math.round(Number(values.orp_sensor)) + 'mV' : '—';
  const reason = String(live.last_reason || liveWrap?.lastLog?.[0]?.reason || (live.flow_fault ? 'Flow fault latched' : (live.spa_active ? 'Spa boost active' : 'Waiting for schedule or demand'))).slice(0, 96);
  const warns = [];
  if (!mapped('filter_pump')) warns.push('No filter pump');
  if (!mapped('temp_water')) warns.push('No water temp sensor');
  if (mapped('solar_pump') && !mapped('temp_collector')) warns.push('Solar pump without collector temp');
  if (mapped('heat_source_2') && !mapped('heat_source_1')) warns.push('Source 2 without source 1');
  if ((mapped('solar_pump') || mapped('heat_source_1') || mapped('heat_source_2')) && !mapped('flow_switch')) warns.push('No flow switch');
  if ((mapped('ph_minus_pump') || mapped('ph_plus_pump')) && !mapped('ph_sensor')) warns.push('Dosing without pH sensor');
  if (mapped('cl_pump') && !mapped('orp_sensor')) warns.push('Cl pump without ORP sensor');
  const pills = [
    renderBadge(status, status === 'FAULT' ? '#ff6b6b' : (status === 'BACKWASH' ? '#f59e0b' : (status === 'SPA' ? '#a855f7' : (status === 'ANTI_FREEZE' ? '#06b6d4' : '#22d97a'))), status === 'FAULT' ? 'rgba(255,107,107,.35)' : (status === 'BACKWASH' ? 'rgba(245,158,11,.35)' : (status === 'SPA' ? 'rgba(168,85,247,.3)' : (status === 'ANTI_FREEZE' ? 'rgba(6,182,212,.3)' : 'rgba(34,217,122,.35)')))),
    renderBadge('WATER ' + tempWater, '#06b6d4', 'rgba(6,182,212,.28)'),
    renderBadge('TARGET ' + target, 'var(--text)', 'var(--line)'),
    renderBadge('FILT ' + hours + ' / ' + hoursTarget, 'var(--text)', 'var(--line)'),
    live.filter_pump_on ? renderBadge('FILTER ON', '#22d97a', 'rgba(34,217,122,.28)') : '',
    live.solar_active ? renderBadge('SOLAR', '#f59e0b', 'rgba(245,158,11,.35)') : '',
    live.heat_source_1_on ? renderBadge((live.source_1_type || 'SRC1').toUpperCase() + ' ON', '#ff9a3a', 'rgba(255,154,58,.28)') : '',
    live.heat_source_2_on ? renderBadge((live.source_2_type || 'SRC2').toUpperCase() + ' ON', '#ff9a3a', 'rgba(255,154,58,.28)') : '',
    live.spa_active ? renderBadge('SPA', '#a855f7', 'rgba(168,85,247,.3)') : '',
    live.backwash_running ? renderBadge('BACKWASH', '#f59e0b', 'rgba(245,158,11,.35)') : '',
    live.backwash_needed ? renderBadge('BACKWASH NEEDS OK', '#f59e0b', 'rgba(245,158,11,.35)') : '',
    live.anti_freeze_active ? renderBadge('ANTI-FREEZE', '#06b6d4', 'rgba(6,182,212,.3)') : '',
    live.flow_fault ? renderBadge('FLOW FAULT', '#ff6b6b', 'rgba(255,107,107,.35)') : '',
    live.hp1_fault ? renderBadge('HP1 FAULT', '#ff6b6b', 'rgba(255,107,107,.35)') : '',
    live.hp2_fault ? renderBadge('HP2 FAULT', '#ff6b6b', 'rgba(255,107,107,.35)') : ''
  ].filter(Boolean);
  let html = `<div style="display:flex;gap:6px;flex-wrap:wrap;margin:0 0 8px">${pills.join('')}</div>`;
  if (reason) html += `<div style="display:flex;gap:6px;flex-wrap:wrap;margin:0 0 8px">${renderBadge(reason, 'var(--muted)', 'var(--line)')}</div>`;
  html += `<div style="display:flex;gap:6px;flex-wrap:wrap;margin:0 0 8px">${renderBadge('PRESS ' + pressure, 'var(--muted)', 'var(--line)')}${renderBadge('pH ' + ph, 'var(--muted)', 'var(--line)')}${renderBadge('ORP ' + orp, 'var(--muted)', 'var(--line)')}${live.lights_on ? renderBadge('LIGHTS', '#1d8cff', 'rgba(29,140,255,.28)') : ''}${live.spa_jets_on ? renderBadge('JETS', '#a855f7', 'rgba(168,85,247,.3)') : ''}${live.dose_ph_minus_active ? renderBadge('pH-', '#f59e0b', 'rgba(245,158,11,.35)') : ''}${live.dose_ph_plus_active ? renderBadge('pH+', '#22d97a', 'rgba(34,217,122,.28)') : ''}${live.dose_cl_active ? renderBadge('CL', '#06b6d4', 'rgba(6,182,212,.28)') : ''}</div>`;
  if (warns.length) html += `<div style="display:flex;gap:6px;flex-wrap:wrap;margin:0 0 10px">${warns.map(w => renderBadge('⚠ ' + w, '#f59e0b', 'rgba(245,158,11,.35)')).join('')}</div>`;
  return html;

function renderHydronicSummary(inst, settings, liveWrap) {

  const calling = Number(live.calling_zones || 0);
  const zones = Number(live.configured_zones || maps.filter(m => /^zone_\d+_pump$/.test(String(m.input_key||'')) && m.io_id).length || 0);
  const tempSupply = live.temp_supply != null ? Number(live.temp_supply).toFixed(1) + '°C' : '—';
  const tempBuffer = live.temp_buffer != null ? Number(live.temp_buffer).toFixed(1) + '°C' : '—';

function analyzePresenceMappings(currentMappings={}) {
  const lightIds = [1,2,3,4].map(i => Number(currentMappings['light_'+i]||0)).filter(Boolean);
  const tv = Number(currentMappings['tv_relay']||0)||null;
  const awning = Number(currentMappings['awning_relay']||0)||null;
  const issues = [];
  const ioUse = new Map();
  const note = (id,label) => { if(!id) return; if(!ioUse.has(id)) ioUse.set(id, []); ioUse.get(id).push(label); };
  lightIds.forEach((id, idx) => note(id, 'Light ' + (idx+1)));
  note(tv, 'TV relay');
  note(awning, 'Awning relay');
  if (!lightIds.length) issues.push({severity:'bad', message:'Map at least one light output.'});
  if (lightIds.length === 1) issues.push({severity:'info', message:'Only one light is mapped. Add more lights for a more natural simulation.'});
  if (!tv && !awning) issues.push({severity:'info', message:'Only light simulation is configured. TV and awning are optional.'});
  [...ioUse.entries()].forEach(([ioId, labels]) => {
    if (labels.length > 1) issues.push({severity:'warn', message:`The same IO is reused for ${labels.join(', ')}.`});
  });
  const readiness = issues.some(i=>i.severity==='bad') ? 'Needs fixes' : (issues.some(i=>i.severity==='warn') ? 'Check mappings' : 'Ready');
  return { lightIds, tv, awning, issues, readiness };
}

function analyzeWaterManagerMappings(currentMappings={}) {
  const leakIds = [1,2,3,4].map(i => Number(currentMappings['leak_sensor_'+i]||0)).filter(Boolean);
  const mainValve = Number(currentMappings['main_valve']||0)||null;
  const flow = Number(currentMappings['flow_sensor']||0)||null;
  const pressure = Number(currentMappings['pressure_sensor']||0)||null;
  const issues = [];
  const ioUse = new Map();
  const note = (id, label) => {
    if (!id) return;
    if (!ioUse.has(id)) ioUse.set(id, []);
    ioUse.get(id).push(label);
  };
  leakIds.forEach((id, idx) => note(id, 'Leak ' + (idx+1)));
  note(mainValve, 'Main valve');
  note(flow, 'Flow');
  note(pressure, 'Pressure');

  if (!mainValve) issues.push({severity:'bad', message:'Map the main water valve output.'});
  if (!leakIds.length) issues.push({severity:'bad', message:'Map at least one leak sensor.'});
  if (mainValve && leakIds.includes(mainValve)) issues.push({severity:'bad', message:'Main valve reuses the same IO as a leak sensor.'});
  if (flow && !leakIds.length) issues.push({severity:'info', message:'Flow meter is mapped but no leak sensors are configured yet.'});
  if (pressure && !leakIds.length) issues.push({severity:'info', message:'Pressure sensor is mapped but no leak sensors are configured yet.'});
  if (!flow && !pressure) issues.push({severity:'info', message:'Only direct leak sensors are mapped. Ghost-flow and burst detection stay disabled.'});
  [...ioUse.entries()].forEach(([ioId, labels]) => {
    if (labels.length > 1) issues.push({severity:'warn', message:`The same IO is reused for ${labels.join(', ')}.`});
  });
  const readiness = issues.some(i=>i.severity==='bad') ? 'Needs fixes' : (issues.some(i=>i.severity==='warn') ? 'Check mappings' : 'Ready');
  return { leakIds, mainValve, flow, pressure, issues, readiness };
}

function analyzeLoadShifterMappings(currentMappings={}) {
  const map = key => Number(currentMappings[key] || 0) || null;
  const power = map('power_w');
  const loads = [1,2,3,4].map(i => ({ key:'load_'+i, idx:i, io: map('load_'+i) })).filter(x => !!x.io);
  const threshold = Number(document.getElementById('sp_new_power_threshold')?.value || document.getElementById('sp_0_power_threshold')?.value || 8000);
  const restoreBelow = Number(document.getElementById('sp_new_restore_below')?.value || document.getElementById('sp_0_restore_below')?.value || 6000);
  const issues = [];
  const ioUse = new Map();
  const note = (id,label) => { if(!id) return; if(!ioUse.has(id)) ioUse.set(id, []); ioUse.get(id).push(label); };
  note(power, 'Power meter');
  loads.forEach(l => note(l.io, 'Load '+l.idx));
  if (!power) issues.push({ severity:'bad', message:'Map the site power meter (W).' });
  if (!loads.length) issues.push({ severity:'bad', message:'Map at least one controllable load output.' });
  if (!map('load_1')) issues.push({ severity:'info', message:'Load 1 is not mapped. Start with your most important controllable load there.' });
  if (restoreBelow >= threshold) issues.push({ severity:'bad', message:'Restore below must be lower than shed above.' });
  if (loads.length === 1) issues.push({ severity:'info', message:'Only one load is mapped. Load shifting will work, but there is no priority ladder yet.' });
  [...ioUse.entries()].forEach(([ioId, labels]) => {
    if (labels.length > 1) issues.push({ severity:'warn', message:`The same IO is reused for ${labels.join(', ')}.` });
  });
  const readiness = issues.some(i=>i.severity==='bad') ? 'Needs fixes' : (issues.some(i=>i.severity==='warn') ? 'Check mappings' : 'Ready');
  return { power, loads, threshold, restoreBelow, issues, readiness };
}

  const names = [1,2,3,4].map(i => ({ idx:i, value:String(document.getElementById('sp_new_equipment_name_'+i)?.value || document.getElementById('sp_0_equipment_name_'+i)?.value || ('Equipment '+i)).trim() }));
  const issues = [];
  const ioUse = new Map();
  const note = (id,label) => { if(!id) return; if(!ioUse.has(id)) ioUse.set(id, []); ioUse.get(id).push(label); };
  equipments.forEach(eq => note(eq.io, 'Equipment '+eq.idx));
  const mapped = equipments.filter(e => e.io);
  if (!equipments[0].io) issues.push({ severity:'bad', message:'Map Equipment 1. At least one tracked equipment input is required.' });
  if (!mapped.length) issues.push({ severity:'bad', message:'Map at least one relay/DI that indicates running equipment.' });
  if (mapped.length === 1) issues.push({ severity:'info', message:'Only one equipment item is tracked. Add more later if needed.' });
  intervals.forEach(it => {
    if (mapped.some(e => e.idx===it.idx) && (!Number.isFinite(it.value) || it.value <= 0)) issues.push({ severity:'warn', message:`Service interval for equipment ${it.idx} should be greater than 0.` });
  });
  names.forEach(n => {
    if (mapped.some(e => e.idx===n.idx) && !n.value) issues.push({ severity:'warn', message:`Give equipment ${n.idx} a friendly name for notifications.` });
  });
  [...ioUse.entries()].forEach(([ioId, labels]) => { if (labels.length > 1) issues.push({ severity:'warn', message:`The same IO is reused for ${labels.join(', ')}.` }); });
  const readiness = issues.some(i=>i.severity==='bad') ? 'Needs fixes' : (issues.some(i=>i.severity==='warn') ? 'Check settings' : 'Ready');
  return { equipments, mapped, intervals, names, issues, readiness };
}

function renderMaintenanceSummary(inst, settings, live) {
  const maps = inst.mappings || [];
  const mapped = key => maps.some(m => m.input_key === key && m.io_id);
  const state = live?.state || {};
  const tracked = Array.isArray(state.equipment) ? state.equipment : [1,2,3,4].filter(i => mapped('equipment_'+i)).map(i => ({
    idx:i,
    name: settings['equipment_name_'+i] || ('Equipment '+i),
    hours: Number(settings['_hours_'+i] || 0),
    interval: Number(settings['service_interval_h_'+i] || 0),
    due: Number(settings['service_interval_h_'+i]||0) > 0 && (Number(settings['_hours_'+i]||0) - Number(settings['_hours_at_service_'+i]||0)) >= Number(settings['service_interval_h_'+i]||0),
    on: false
  }));
  const dueCount = Number(state.due_count != null ? state.due_count : tracked.filter(t=>t.due).length);
  const runningCount = Number(state.running_count != null ? state.running_count : tracked.filter(t=>t.on).length);
  const status = String(state.status || (dueCount>0 ? 'service_due' : 'monitoring')).toUpperCase();
  const warns = [];
  if (!mapped('equipment_1')) warns.push('Equipment 1 is not mapped');
  if (!tracked.length) warns.push('No tracked equipment mapped');
  const pills = [
    renderBadge(status, status==='SERVICE_DUE' ? '#ff6b6b' : '#22d97a', status==='SERVICE_DUE' ? 'rgba(255,107,107,.35)' : 'rgba(34,217,122,.35)'),
    renderBadge('TRACKED '+tracked.length, 'var(--text)', 'var(--line)'),
    renderBadge('RUNNING '+runningCount, '#1d8cff', 'rgba(29,140,255,.28)'),
    dueCount ? renderBadge('DUE '+dueCount, '#ff6b6b', 'rgba(255,107,107,.35)') : ''
  ].filter(Boolean);
  let html = `<div style="display:flex;gap:6px;flex-wrap:wrap;margin:0 0 8px">${pills.join('')}</div>`;
  if (state.last_reason) html += `<div style="display:flex;gap:6px;flex-wrap:wrap;margin:0 0 8px">${renderBadge(String(state.last_reason).slice(0,80), 'var(--muted)', 'var(--line)')}</div>`;
  if (tracked.length) {
    const rows = tracked.slice(0,4).map(t => {
      const due = !!t.due;
      const since = Number(t.hours_since_service != null ? t.hours_since_service : Math.max(0, Number(t.hours||0) - Number(settings['_hours_at_service_'+t.idx]||0)));
      return renderBadge(`${due ? '⚠ ' : ''}${(t.name||('Eq '+t.idx)).toUpperCase().slice(0,18)} ${Number(since).toFixed(0)}h`, due ? '#ff6b6b' : (t.on ? '#22d97a' : 'var(--muted)'), due ? 'rgba(255,107,107,.35)' : (t.on ? 'rgba(34,217,122,.28)' : 'var(--line)'));
    }).join('');
    html += `<div style="display:flex;gap:6px;flex-wrap:wrap;margin:0 0 8px">${rows}</div>`;
  }
  if (warns.length) html += `<div style="display:flex;gap:6px;flex-wrap:wrap;margin:0 0 10px">${warns.map(w => renderBadge('⚠ '+w, '#f59e0b', 'rgba(245,158,11,.35)')).join('')}</div>`;
  return html;
}

function analyzeSmartLightingMappings(currentMappings={}) {
  const entries = Object.entries(currentMappings).filter(([,v]) => !!Number(v));
  const outputs = entries.filter(([k]) => /^do_|^ao_/.test(k)).map(([key, io]) => ({ key, io:Number(io) }));
  const inputs = entries.filter(([k]) => /^di_|^ai_/.test(k)).map(([key, io]) => ({ key, io:Number(io) }));
  const issues = [];
  const ioUse = new Map();
  const note = (id, label) => {
    if (!id) return;
    if (!ioUse.has(id)) ioUse.set(id, []);
    ioUse.get(id).push(label);
  };
  outputs.forEach(o => note(o.io, o.key.toUpperCase()));
  inputs.forEach(i => note(i.io, i.key.toUpperCase()));

  if (!outputs.length) issues.push({ severity:'bad', message:'Map at least one output (relay or dimmer).' });
  if (!inputs.length) issues.push({ severity:'info', message:'No trigger inputs mapped yet. Scenarios can still be activated manually or from schedules.' });

  [...ioUse.entries()].forEach(([ioId, labels]) => {
    if (labels.length > 1) issues.push({ severity:'warn', message:`The same IO is reused for ${labels.join(', ')}.` });
  });

  const readiness = issues.some(i=>i.severity==='bad') ? 'Needs outputs' : (issues.some(i=>i.severity==='warn') ? 'Check mappings' : 'Ready');
  return { outputs, inputs, issues, readiness };
}

          ${visibleCount > suggestedCount ? `<button type="button" class="btn ghost" onclick="setThermostatVisibleZones(${Math.max(1, suggestedCount)})">Hide Empty</button>` : ''}
          ${visibleCount < 6 ? `<button type="button" class="btn ghost" onclick="setThermostatVisibleZones(6)">Show All</button>` : ''}
        </div>
      </div>

  for (let i = 1; i <= visibleCount; i++) {

// ── Enrich instance card with setpoints + log ─────────────────────────────
async function enrichCard(inst) {
  const def = inst.definition;
  if (!def?.setpoints?.length && inst.module_id !== "custom" && inst.module_id !== "smart_lighting") {
    document.getElementById(`sp_${inst.id}`).innerHTML = "";
    return;
  }

  // Load settings
  let settings = {};
  try {
    const d = await api(moduleSettingsEndpoint(inst));
    settings = d.settings || d.setpoints || {};
  } catch {}

  const spEl = document.getElementById(`sp_${inst.id}`);
  if (!spEl) return;

  try {
    inst._liveStatus = await api(`/api/automation/status/${inst.id}`);
  } catch {}
  if (inst.module_id === 'solar') {
    try { inst._liveStatus = await api(`/api/automation/solar/${inst.id}/status`); } catch {}
  }
  try {
    const mapsEl = document.getElementById(`maps_${inst.id}`);
    if (mapsEl) mapsEl.innerHTML = renderInstanceMapRows(inst, def, inst.mappings || []);
  } catch {}

  if (inst.module_id === "smart_lighting") {
    // ── Smart Lighting: Scenario Editor button ─────────────────────
    let scenarios = [];
    let scCount = 0;
    const testMode = String(settings.test_mode || '0') === '1';
    try { scenarios = JSON.parse(settings.scenarios||'[]'); } catch {}
    if (!Array.isArray(scenarios)) scenarios = [];
    scCount = scenarios.filter(s=>s.enabled!==false).length;
    const summary = renderSmartLightingSummary(inst, scenarios, inst._liveStatus);
    spEl.innerHTML = `
      <div class="sp-panel">
        <div class="sp-title">✨ Scenarios</div>
        ${summary}
        <div style="display:flex;gap:6px;flex-wrap:wrap;margin:0 0 10px">${testMode ? renderBadge('TEST MODE', '#ffd978', 'rgba(255,201,71,.35)') : ''}</div>
        <button class="btn btn-sm" style="width:100%;background:linear-gradient(135deg,rgba(240,192,64,.15),rgba(240,192,64,.05));border-color:rgba(240,192,64,.4);color:#f0c040"
                onclick="openScenarioEditor(${inst.id})">
          🎬 Edit Scenarios
        </button>
        <button class="btn btn-sm" style="width:100%;margin-top:8px;border-color:${testMode ? 'rgba(255,201,71,.35)' : 'var(--line2)'};color:${testMode ? '#ffd978' : 'var(--muted2)'};background:${testMode ? 'rgba(255,201,71,.08)' : 'rgba(255,255,255,.03)'}"
                onclick="toggleModuleTestMode(${inst.id}, '${settings.test_mode || '0'}')">
          ${testMode ? '🧪 Disable Test Mode' : '🧪 Enable Test Mode'}
        </button>
        <div style="font-size:11px;color:var(--muted);margin-top:6px;text-align:center">
          ${scCount} active scenario(s)
        </div>
      </div>`;

  } else if (inst.module_id === "custom") {
    // ── Engineering Rules: Rule Builder + Alarm Reset ───────────────
    const testMode = String(settings.test_mode || '0') === '1';
    spEl.innerHTML = `
      <div class="sp-panel">
        <div class="sp-title">⚡ Rule Builder</div>
        <div style="display:flex;gap:6px;flex-wrap:wrap;margin:0 0 10px">${testMode ? renderBadge('TEST MODE', '#ffd978', 'rgba(255,201,71,.35)') : ''}</div>
        <button class="btn btn-sm btn-purple" style="width:100%" onclick="openRuleBuilder(${inst.id},'${inst.module_id}')">
          ✏️ Edit Rules
        </button>

        <button class="btn btn-sm" style="width:100%;margin-top:8px;border-color:${testMode ? 'rgba(255,201,71,.35)' : 'var(--line2)'};color:${testMode ? '#ffd978' : 'var(--muted2)'};background:${testMode ? 'rgba(255,201,71,.08)' : 'rgba(255,255,255,.03)'}" onclick="toggleModuleTestMode(${inst.id}, '${settings.test_mode || '0'}')">
          ${testMode ? '🧪 Disable Test Mode' : '🧪 Enable Test Mode'}
        </button>

        <button class="btn btn-sm btn-danger" style="width:100%;margin-top:8px" onclick="resetCustomAlarms(${inst.id})">
          🧯 Reset Alarms
        </button>

        <button class="btn btn-sm" style="width:100%;margin-top:8px" onclick="resetCustomLock(${inst.id})">
          🔓 Reset Lock (Engineer)
        </button>

        <div id="ruleCount_${inst.id}" style="font-size:11px;color:var(--muted);margin-top:6px;text-align:center"></div>
      </div>`;
    try {
      const rules = JSON.parse(settings.rules || "[]");
      const el = document.getElementById(`ruleCount_${inst.id}`);
      if (el) el.textContent = `${rules.filter(r=>r.enabled).length} active rule(s)`;
    } catch {}

  } else if (def?.setpoints?.length) {

    // ── Which IOs are actually mapped for this instance? ─────────────
    const mappedKeys = new Set(
      (inst.mappings || []).filter(m => m.io_id).map(m => m.input_key)
    );

    // ── Render grouped setpoints ─────────────────────────────────────
    // Modules that define groups get collapsible sections.
    // Modules without groups fall back to flat list (legacy behaviour).
    const groups = def.groups;

    let innerHTML = "";

    if (groups?.length) {
      innerHTML = groups.map(grp => {
        // Skip group if required IO is not mapped
        if (grp.requires && !mappedKeys.has(grp.requires)) return "";
        // Skip group if a conflicting IO IS mapped (e.g. pump_timers hidden when inverter active)
        if (grp.requires_absent && mappedKeys.has(grp.requires_absent)) return "";

        const sps = def.setpoints.filter(sp => (sp.group || "basic") === grp.id);
        if (!sps.length) return "";

        const rows = sps.map(sp => renderSetpointRow(inst.id, sp, settings)).join("");
        return `
          <details class="sp-group" ${grp.open ? "open" : ""}>
            <summary>${grp.label}</summary>
            ${rows}
          </details>`;
      }).join("");
    } else {
      // Legacy: flat list (non-solar modules)
      innerHTML = def.setpoints.map(sp => renderSetpointRow(inst.id, sp, settings)).join("");
    }

       const summaryHtml = inst.module_id === 'lighting' ? renderLightingSummary(inst, settings, inst._liveStatus) : (inst.module_id === 'solar' ? renderSolarSummary(inst, settings, inst._liveStatus) : (inst.module_id === 'irrigation' ? renderIrrigationSummary(inst, settings, inst._liveStatus) : (inst.module_id === 'hydronic_manager' ? renderHydronicSummary(inst, settings, inst._liveStatus) : (inst.module_id === 'pool_spa' ? renderPoolSpaSummary(inst, settings, inst._liveStatus) : (inst.module_id === 'presence_simulator' ? renderPresenceSummary(inst, settings, inst._liveStatus) : (inst.module_id === 'water_manager' ? renderWaterManagerSummary(inst, settings, inst._liveStatus) : (inst.module_id === 'load_shifter' ? renderLoadShifterSummary(inst, settings, inst._liveStatus) : (inst.module_id === 'maintenance' ? renderMaintenanceSummary(inst, settings, inst._liveStatus) : ''))))))));
	   spEl.innerHTML = `
      <div class="sp-panel">
        <div class="sp-title">⚙️ Setpoints</div>
        ${summaryHtml}
        ${innerHTML}
      </div>`;

  } else {
    spEl.innerHTML = "";
  }

  // Log (unchanged)
  try {
    const d = await api(moduleLogEndpoint(inst));
    const log = (d.log||[]).slice(0,4);
    const logEl = document.getElementById(`log_${inst.id}`);
    if (logEl && log.length) {

        ${log.map(l=>`<div class="log-row">
