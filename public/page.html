<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>ELARIS</title>
  <script>try{document.documentElement.dataset.theme=localStorage.getItem('elaris_theme')||'dark';}catch(e){document.documentElement.dataset.theme='dark';}</script>
  <script src="/csrf.js?v=1"></script>
  <script src="/js/core.js?v=1"></script>
  <link rel="icon" href="/favicon.ico">
  <link rel="manifest" href="/manifest.json">
  <link rel="stylesheet" href="/styles.css?v=22">
<style>
.page-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:16px;padding:20px;overflow-y:auto;flex:1;align-items:start;grid-auto-rows:max-content;}
.inst-card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:18px;position:relative;overflow:hidden;align-self:start;height:auto;}
.inst-card.wide-card{grid-column:span 2;}
.inst-card.thermo-card{max-width:min(40vw,700px);justify-self:start;}
.inst-card::before{content:"";position:absolute;top:0;left:0;right:0;height:2px;background:var(--inst-accent,var(--blue));}
.inst-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.inst-name{font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:1px;color:var(--muted2);}
.inst-id{font-size:10px;color:var(--muted);font-family:monospace;}
.ws-badge{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:999px;font-size:11px;font-weight:700;font-family:monospace;transition:all .3s;}
.ws-badge.online{background:rgba(34,217,122,.12);border:1px solid rgba(34,217,122,.3);color:var(--good);}
.ws-badge.offline{background:rgba(255,69,69,.12);border:1px solid rgba(255,69,69,.3);color:var(--bad);}
.ws-badge.connecting{background:rgba(245,200,0,.10);border:1px solid rgba(245,200,0,.3);color:var(--warn);}
@media(max-width:980px){.page-grid{grid-template-columns:1fr;padding:14px;}.inst-card.wide-card{grid-column:auto;}.inst-card.thermo-card{max-width:none;}}
</style>
</head>
<body>
<div class="app">
  <aside class="side" id="sidebar">
    <div class="brand">
      <img class="brandLogo" src="/logo.png" alt="ELARIS" onerror="this.style.display='none'">
      <div class="brandText"><div class="name">ELARIS</div><div class="tagline">Smart Control</div></div>
    </div>
    <div class="groupTitle">Main</div>
    <nav class="nav"><a href="/">&#127968; Dashboard</a></nav>
    <div id="navContainer"></div>
    <div class="groupTitle">System</div>
    <nav class="nav">
      <a href="/scenes.html">&#127916; Scenes</a>
      <a href="/history.html">&#128200; History</a>
      <a href="/settings.html">&#9881;&#65039; Settings</a>
      <a href="/entities.html">&#128268; Entities</a>
      <a href="/installer.html" id="installerLink">&#128295; Installer</a>
      <a href="/modules.html" id="modulesLink">&#129513; Modules</a>
      <a href="/logs.html">&#128203; Logs</a>
      <a href="/esphome.html">&#128376; ESPHome</a>
      <a href="/help.html">&#10067; Help</a>
      <a href="/admin.html" id="adminLink" style="display:none">Admin</a>
    </nav>
    <div style="padding:16px 20px 8px;margin-top:auto">
      <button class="btn" style="width:100%;font-size:11px" onclick="window.location.href='/'" >&#8592; Dashboard</button>
    </div>
  </aside>
  <div class="overlay" id="overlay" onclick="document.body.classList.remove('sideOpen')"></div>
  <div style="display:flex;flex-direction:column;flex:1;overflow:hidden;min-width:0">
    <div class="topbar" style="margin:12px 16px 0;flex-shrink:0">
      <div class="crumbs">
        <button class="btn" id="menuBtn" style="display:none" onclick="document.body.classList.add('sideOpen')">&#9776;</button>
        <span class="pill" id="sitePill">Site: &mdash;</span>
        <span class="pill ws-badge connecting" id="wsPill">Connecting&hellip;</span>
        <span id="pageTitle" style="font-size:14px;font-weight:800;color:var(--text)"></span>
      </div>
      <div class="actions">
        <a href="/help.html" class="btn">Help</a>
        <button class="btn" onclick="toggleTheme()" id="themeBtn">&#127769;</button>
        <a href="/" class="btn">&#8592; Dashboard</a>
      </div>
    </div>
    <div class="page-grid" id="pageGrid">
      <div style="color:var(--muted);font-size:13px;padding:20px">Loading&hellip;</div>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script src="/theme.js?v=1"></script>
<script src="/role-ui.js?v=2"></script>
<script src="/page.js?v=32"></script>
<script src="/mobile-nav.js"></script>
</body>
</html>
