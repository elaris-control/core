<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>ELARIS — Offline</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:#080c14;color:#e2e8f0;font-family:system-ui,sans-serif;
         display:flex;flex-direction:column;align-items:center;justify-content:center;
         min-height:100vh;gap:16px;padding:24px;text-align:center}
    .icon{font-size:64px;opacity:.4}
    h1{font-size:22px;font-weight:800;color:#fff}
    p{font-size:14px;color:#64748b;max-width:320px;line-height:1.6}
    button{margin-top:8px;padding:10px 24px;border-radius:10px;border:none;
           background:#1d8cff;color:#fff;font-size:14px;font-weight:700;
           cursor:pointer}
    button:hover{background:#1a7de0}
    .dot{width:8px;height:8px;border-radius:50%;background:#f85149;display:inline-block;margin-right:6px}
  </style>
</head>
<body>
  <div class="icon">📡</div>
  <h1>Cannot reach ELARIS</h1>
  <p><span class="dot"></span>The Pi is not reachable right now. Check that you are on the same network or that Tailscale is connected.</p>
  <button onclick="location.reload()">Try again</button>
</body>
</html>
